e single failure\" numa unidade DP Classe 3?", "a_pt": "A falha mais severa considerando também incêndio ou alagamento em um único compartimento, não apenas falha de um componente isolado.", "q_en": "What is the \"worst case single failure\" for a DP Class 3 unit?", "a_en": "The most severe failure considering also fire or flooding in a single compartment, not just an isolated component fault.", "opts_pt": null, "opts_en": null}, {"id": 128, "level": "avancado", "cat": "Análise de Consequência (WCFDI)", "tipo": "qa", "q_pt": "Como a análise de consequência influencia os limites ambientais operacionais?", "a_pt": "Define até que condição de vento/corrente/onda a capacidade residual após a pior falha ainda é suficiente, estabelecendo os limites da ASOG.", "q_en": "How does consequence analysis influence operational environmental limits?", "a_en": "It defines up to what wind, current or wave condition the residual capacity after the worst failure is still sufficient, setting the ASOG limits.", "opts_pt": null, "opts_en": null}, {"id": 129, "level": "avancado", "cat": "Análise de Consequência (WCFDI)", "tipo": "qa", "q_pt": "O que é o \"capability plot\" (gráfico polar de capacidade)?", "a_pt": "Gráfico que mostra a capacidade de empuxo disponível em cada direção sob diferentes condições de falha e ambientais.", "q_en": "What is the \"capability plot\"?", "a_en": "A chart showing the available thrust capacity in each direction under different failure and environmental conditions.", "opts_pt": null, "opts_en": null}, {"id": 130, "level": "avancado", "cat": "Análise de Consequência (WCFDI)", "tipo": "qa", "q_pt": "Por que a análise de consequência deve ser reavaliada durante a operação?", "a_pt": "Porque as condições ambientais e a configuração operacional mudam continuamente, exigindo verificação contínua da margem de segurança.", "q_en": "Why must consequence analysis be reassessed during the operation?", "a_en": "Because environmental conditions and the operational setup change continuously, requiring ongoing verification of the real safety margin.", "opts_pt": null, "opts_en": null}, {"id": 131, "level": "avancado", "cat": "Redundância e Notações de Classe", "tipo": "qa", "q_pt": "O que exige a notação DP(AA) da ABS em comparação com DP2?", "a_pt": "Requisitos equivalentes de redundância a DP2, sem perda de posição numa única falha, sob a classificação da American Bureau of Shipping.", "q_en": "What does the ABS DP(AA) notation require compared to DP2?", "a_en": "Redundancy requirements equivalent to DP2, with no loss of position on a single failure, under American Bureau of Shipping classification.", "opts_pt": null, "opts_en": null}, {"id": 132, "level": "avancado", "cat": "Redundância e Notações de Classe", "tipo": "qa", "q_pt": "Qual a diferença entre redundância física e redundância funcional?", "a_pt": "Física envolve duplicação real de equipamentos e separação de compartimentos; funcional envolve a capacidade de um sistema assumir a função de outro, mesmo sem duplicação total.", "q_en": "What is the difference between physical and functional redundancy?", "a_en": "Physical involves real duplication of equipment and compartment separation; functional involves one system's ability to take over another's function, even without full duplication.", "opts_pt": null, "opts_en": null}, {"id": 133, "level": "avancado", "cat": "Redundância e Notações de Classe", "tipo": "qa", "q_pt": "Por que sistemas DP Classe 3 exigem separação por mamparos A-60?", "a_pt": "Para garantir que um incêndio num compartimento não danifique o sistema redundante localizado em outro compartimento.", "q_en": "Why do DP Class 3 systems require A-60 bulkhead separation?", "a_en": "To ensure that a fire in one compartment does not damage the redundant system located in another compartment.", "opts_pt": null, "opts_en": null}, {"id": 134, "level": "avancado", "cat": "Redundância e Notações de Classe", "tipo": "qa", "q_pt": "O que é redundância de rede de comunicação de dados no sistema DP?", "a_pt": "Duplicação dos barramentos de comunicação entre sensores, computadores DP e propulsores, evitando perda de controle por falha de rede única.", "q_en": "What is data communication network redundancy in the DP system?", "a_en": "Duplication of the communication buses between sensors, DP computers and thrusters, preventing loss of control from a single network failure.", "opts_pt": null, "opts_en": null}, {"id": 135, "level": "avancado", "cat": "Redundância e Notações de Classe", "tipo": "qa", "q_pt": "Como a redundância se aplica ao computador de controle DP?", "a_pt": "Sistemas DP2/DP3 exigem no mínimo dois computadores DP independentes, com comutação automática em caso de falha de um deles.", "q_en": "How does redundancy apply to the DP control computer?", "a_en": "DP2/DP3 systems require at least two independent DP computers, with automatic switchover if one fails.", "opts_pt": null, "opts_en": null}, {"id": 136, "level": "avancado", "cat": "Redundância e Notações de Classe", "tipo": "qa", "q_pt": "O que verifica o teste de \"changeover\" entre computadores DP redundantes?", "a_pt": "Se a transferência de controle de um computador para outro ocorre sem perda de posição ou comando indevido aos propulsores.", "q_en": "What does the \"changeover\" test between redundant DP computers verify?", "a_en": "Whether control transfer from one computer to the other occurs without loss of position or improper thruster commands.", "opts_pt": null, "opts_en": null}, {"id": 137, "level": "avancado", "cat": "Redundância e Notações de Classe", "tipo": "qa", "q_pt": "Por que a redundância de sistemas de referência de posição deve incluir tecnologias diferentes?", "a_pt": "Para evitar que um mesmo tipo de erro ambiental afete todos os sensores simultaneamente.", "q_en": "Why must position reference system redundancy include different technologies?", "a_en": "To prevent the same type of environmental error from affecting all sensors simultaneously.", "opts_pt": null, "opts_en": null}, {"id": 138, "level": "avancado", "cat": "Redundância e Notações de Classe", "tipo": "qa", "q_pt": "O que é a \"independência\" de sensores exigida em DP3?", "a_pt": "Sensores devem ter fontes de energia, cabeamento e localização física independentes, evitando falha comum.", "q_en": "What is the sensor \"independence\" required in DP3?", "a_en": "Sensors must have independent power sources, cabling and physical location, avoiding common-cause failure.", "opts_pt": null, "opts_en": null}, {"id": 139, "level": "avancado", "cat": "Redundância e Notações de Classe", "tipo": "qa", "q_pt": "Como a redundância de geradores se relaciona à redundância de propulsores?", "a_pt": "Cada seção redundante de energia deve alimentar propulsores suficientes para manter posição, mesmo com a perda de uma seção.", "q_en": "How does generator redundancy relate to thruster redundancy?", "a_en": "Each redundant power section must be able to supply enough thrusters to hold position, even with the loss of one section.", "opts_pt": null, "opts_en": null}, {"id": 140, "level": "avancado", "cat": "Redundância e Notações de Classe", "tipo": "qa", "q_pt": "O que é o princípio de \"self-healing\" em sistemas DP modernos?", "a_pt": "A capacidade do sistema de detectar uma falha e reconfigurar automaticamente energia e alocação de empuxo sem intervenção manual imediata.", "q_en": "What is the \"self-healing\" principle in modern DP systems?", "a_en": "The system's ability to detect a failure and automatically reconfigure power and thrust allocation without immediate manual intervention.", "opts_pt": null, "opts_en": null}, {"id": 141, "level": "avancado", "cat": "Arquiteturas de Sistemas Comerciais", "tipo": "qa", "q_pt": "Qual fabricante produz a linha de sistemas DP \"K-Pos\"?", "a_pt": "Kongsberg Maritime, da Noruega.", "q_en": "Which manufacturer produces the \"K-Pos\" line of DP systems?", "a_en": "Kongsberg Maritime, from Norway.", "opts_pt": null, "opts_en": null}, {"id": 142, "level": "avancado", "cat": "Arquiteturas de Sistemas Comerciais", "tipo": "qa", "q_pt": "O que caracteriza a série Kongsberg K-Pos DP-21/22?", "a_pt": "Sistemas de controle DP redundantes, com arquitetura de computadores duplos/triplos, integrados a sensores e joystick, usados em Classe DP2/DP3.", "q_en": "What characterizes the Kongsberg K-Pos DP-21/22 series?", "a_en": "Redundant DP control systems with dual or triple computer architecture, integrated with sensors and joystick, used for DP2/DP3 class.", "opts_pt": null, "opts_en": null}, {"id": 143, "level": "avancado", "cat": "Arquiteturas de Sistemas Comerciais", "tipo": "qa", "q_pt": "Qual empresa historicamente desenvolveu sistemas DP sob a marca Alstom/Converteam, hoje parte da GE Power Conversion?", "a_pt": "A Alstom, posteriormente Converteam, adquirida pela General Electric (GE Power Conversion).", "q_en": "Which company historically developed DP systems under the Alstom/Converteam brand, now part of GE Power Conversion?", "a_en": "Alstom, later Converteam, acquired by General Electric (GE Power Conversion).", "opts_pt": null, "opts_en": null}, {"id": 144, "level": "avancado", "cat": "Arquiteturas de Sistemas Comerciais", "tipo": "qa", "q_pt": "Cite outro fabricante relevante de sistemas DP além de Kongsberg e GE/Alstom.", "a_pt": "Marine Technologies (MT), L3Harris (antigo L-3 SAM Electronics) e Praxis Automation, entre outros.", "q_en": "Name another relevant DP system manufacturer besides Kongsberg and GE/Alstom.", "a_en": "Marine Technologies (MT), L3Harris (formerly L-3 SAM Electronics) and Praxis Automation, among others.", "opts_pt": null, "opts_en": null}, {"id": 145, "level": "avancado", "cat": "Arquiteturas de Sistemas Comerciais", "tipo": "qa", "q_pt": "O que é o \"Joystick mode\" comum a sistemas DP comerciais?", "a_pt": "Modo manual assistido em que o operador controla diretamente o vetor de empuxo e rumo, com o computador ainda gerenciando a alocação entre propulsores.", "q_en": "What is \"Joystick mode\", common to commercial DP systems?", "a_en": "An assisted manual mode where the operator directly controls the thrust and heading vector, with the computer still managing allocation among thrusters.", "opts_pt": null, "opts_en": null}, {"id": 146, "level": "avancado", "cat": "Arquiteturas de Sistemas Comerciais", "tipo": "qa", "q_pt": "O que é o modo \"Auto Position\" (DP Auto)?", "a_pt": "Modo totalmente automático em que o sistema mantém posição e rumo no setpoint definido, sem intervenção manual contínua.", "q_en": "What is \"Auto Position\" (DP Auto) mode?", "a_en": "A fully automatic mode in which the system holds position and heading at the defined setpoint, without continuous manual input.", "opts_pt": null, "opts_en": null}, {"id": 147, "level": "avancado", "cat": "Arquiteturas de Sistemas Comerciais", "tipo": "qa", "q_pt": "Por que algumas unidades Classe 3 usam arquitetura \"triple modular\" redundante?", "a_pt": "Para permitir votação entre três computadores/sensores, aumentando a confiabilidade na detecção de falhas.", "q_en": "Why do some Class 3 units use a redundant \"triple modular\" architecture?", "a_en": "To allow voting between three computers or sensors, increasing reliability in fault detection.", "opts_pt": null, "opts_en": null}, {"id": 148, "level": "avancado", "cat": "Arquiteturas de Sistemas Comerciais", "tipo": "qa", "q_pt": "O que diferencia um simulador DP de treinamento (ex: Kongsberg K-Sim) de um sistema DP real?", "a_pt": "O simulador reproduz o comportamento do software e da interface real para treinamento e certificação, sem controlar propulsores físicos.", "q_en": "What distinguishes a training DP simulator (e.g. Kongsberg K-Sim) from a real DP system?", "a_en": "The simulator reproduces the behavior of the real software and interface for training and certification, without controlling actual physical thrusters.", "opts_pt": null, "opts_en": null}, {"id": 149, "level": "avancado", "cat": "Arquiteturas de Sistemas Comerciais", "tipo": "qa", "q_pt": "Por que a interoperabilidade entre fabricantes de sensores e sistemas DP é um desafio técnico?", "a_pt": "Protocolos proprietários e formatos de dados distintos podem exigir interfaces específicas para garantir comunicação confiável.", "q_en": "Why is interoperability between sensor and DP system manufacturers a technical challenge?", "a_en": "Proprietary protocols and different data formats may require specific interfaces to ensure reliable communication.", "opts_pt": null, "opts_en": null}, {"id": 150, "level": "avancado", "cat": "Arquiteturas de Sistemas Comerciais", "tipo": "qa", "q_pt": "O que é um Independent Joystick System (IJS) exigido como backup em algumas unidades DP3?", "a_pt": "Um sistema de joystick totalmente independente do sistema DP principal, usado como último recurso manual em caso de falha total.", "q_en": "What is an Independent Joystick System (IJS) required as backup on some DP3 units?", "a_en": "A joystick system fully independent of the main DP system, used as a last manual resort in the event of total system failure.", "opts_pt": null, "opts_en": null}, {"id": 151, "level": "avancado", "cat": "Alocação de Empuxo", "tipo": "qa", "q_pt": "O que é \"thrust allocation\" no controle DP?", "a_pt": "O algoritmo que distribui a força e o momento requeridos entre os propulsores disponíveis, otimizando eficiência e respeitando restrições.", "q_en": "What is \"thrust allocation\" in DP control?", "a_en": "The algorithm that distributes the required force and moment among the available thrusters, optimizing efficiency and respecting physical constraints.", "opts_pt": null, "opts_en": null}, {"id": 152, "level": "avancado", "cat": "Alocação de Empuxo", "tipo": "qa", "q_pt": "Por que a alocação de empuxo é um problema de otimização com restrições?", "a_pt": "Deve minimizar consumo/desgaste e evitar interação entre jatos, respeitando limites de potência e ângulos proibidos de cada propulsor.", "q_en": "Why is thrust allocation a constrained optimization problem?", "a_en": "It must minimize consumption and wear and avoid jet interaction, while respecting power limits and each thruster's forbidden angles.", "opts_pt": null, "opts_en": null}, {"id": 153, "level": "avancado", "cat": "Alocação de Empuxo", "tipo": "qa", "q_pt": "O que é \"power limitation\" na alocação de empuxo?", "a_pt": "Restrição imposta para reservar capacidade elétrica, evitando sobrecarga do sistema de energia durante manobras intensas.", "q_en": "What is \"power limitation\" in thrust allocation?", "a_en": "A restriction imposed to reserve electrical capacity, preventing overload of the power system during intense maneuvers.", "opts_pt": null, "opts_en": null}, {"id": 154, "level": "avancado", "cat": "Alocação de Empuxo", "tipo": "qa", "q_pt": "O que significa \"thrust bias\" aplicado deliberadamente por um DPO?", "a_pt": "Empuxo adicional constante aplicado numa direção específica para pré-tensionar ou favorecer determinada resposta, como durante reboque.", "q_en": "What does \"thrust bias\" deliberately applied by a DPO mean?", "a_en": "A constant additional thrust applied in a specific direction to pre-tension or favor a certain response, such as during towing.", "opts_pt": null, "opts_en": null}, {"id": 155, "level": "avancado", "cat": "Alocação de Empuxo", "tipo": "qa", "q_pt": "Por que a alocação deve considerar a interação hidrodinâmica entre propulsores próximos?", "a_pt": "Porque o fluxo de um propulsor pode reduzir a eficiência de outro nas proximidades, exigindo compensação matemática.", "q_en": "Why must allocation consider hydrodynamic interaction between nearby thrusters?", "a_en": "Because the flow from one thruster can reduce the efficiency of another nearby, requiring mathematical compensation.", "opts_pt": null, "opts_en": null}, {"id": 156, "level": "avancado", "cat": "Alocação de Empuxo", "tipo": "qa", "q_pt": "O que é uma \"singularidade\" no algoritmo de alocação com propulsores azimutais?", "a_pt": "Condição em que pequenas mudanças no comando resultam em grandes variações rápidas de ângulo, podendo causar desgaste mecânico ou instabilidade.", "q_en": "What is a \"singularity\" in the allocation algorithm with azimuth thrusters?", "a_en": "A condition in which small changes in command result in large, fast variations in angle, potentially causing mechanical wear or instability.", "opts_pt": null, "opts_en": null}, {"id": 157, "level": "avancado", "cat": "Alocação de Empuxo", "tipo": "qa", "q_pt": "Como o algoritmo de alocação trata a perda súbita de um propulsor?", "a_pt": "Redistribui instantaneamente a demanda de força e momento entre os propulsores restantes, dentro da capacidade disponível.", "q_en": "How does the allocation algorithm handle the sudden loss of a thruster?", "a_en": "It instantly redistributes the force and moment demand among the remaining thrusters, within available capacity.", "opts_pt": null, "opts_en": null}, {"id": 158, "level": "avancado", "cat": "Alocação de Empuxo", "tipo": "qa", "q_pt": "O que é a interação entre o PMS e o algoritmo de alocação de empuxo?", "a_pt": "Comunicação em tempo real que permite ao algoritmo respeitar a potência elétrica realmente disponível, evitando comandos que causem blackout.", "q_en": "What is the interaction between the PMS and the thrust allocation algorithm?", "a_en": "Real-time communication that lets the allocation algorithm respect the electrical power actually available, avoiding commands that would cause a blackout.", "opts_pt": null, "opts_en": null}, {"id": 159, "level": "avancado", "cat": "Alocação de Empuxo", "tipo": "qa", "q_pt": "Por que as zonas proibidas de propulsores azimutais mudam conforme a configuração operacional?", "a_pt": "Porque a proximidade de estruturas, outros propulsores ou linhas submersas pode variar, exigindo ajuste dinâmico dessas zonas.", "q_en": "Why do forbidden zones for azimuth thrusters change with the operational setup?", "a_en": "Because the proximity of structures, other thrusters or subsea lines can vary, requiring dynamic adjustment of those zones.", "opts_pt": null, "opts_en": null}, {"id": 160, "level": "avancado", "cat": "Alocação de Empuxo", "tipo": "qa", "q_pt": "O que é \"rate limiting\" aplicado a comandos de propulsores?", "a_pt": "Limitação da velocidade de variação do comando para evitar desgaste mecânico e instabilidade dinâmica.", "q_en": "What is \"rate limiting\" applied to thruster commands?", "a_en": "A limit on how fast a command can change, to prevent mechanical wear and dynamic instability.", "opts_pt": null, "opts_en": null}, {"id": 161, "level": "avancado", "cat": "Falhas Críticas: Drift-off, Drive-off e Blackout", "tipo": "qa", "q_pt": "O que é \"drift-off\" em DP?", "a_pt": "Perda gradual de posição, geralmente causada por perda de empuxo, sem comando indevido de propulsores.", "q_en": "What is \"drift-off\" in DP?", "a_en": "A gradual loss of position, usually caused by loss of thrust, without an improper thruster command.", "opts_pt": null, "opts_en": null}, {"id": 162, "level": "avancado", "cat": "Falhas Críticas: Drift-off, Drive-off e Blackout", "tipo": "qa", "q_pt": "O que é \"drive-off\" em DP?", "a_pt": "Movimento indesejado e geralmente rápido da embarcação, causado por comando incorreto do sistema.", "q_en": "What is \"drive-off\" in DP?", "a_en": "An unwanted, usually fast, movement of the vessel caused by an incorrect system command.", "opts_pt": null, "opts_en": null}, {"id": 163, "level": "avancado", "cat": "Falhas Críticas: Drift-off, Drive-off e Blackout", "tipo": "qa", "q_pt": "Qual falha é geralmente mais perigosa em termos de tempo de resposta: drift-off ou drive-off?", "a_pt": "Drive-off, pois o movimento pode ser rápido e inesperado, exigindo intervenção imediata do DPO.", "q_en": "Which failure is generally more dangerous in terms of response time: drift-off or drive-off?", "a_en": "Drive-off, since the movement can be fast and unexpected, requiring immediate action from the DPO.", "opts_pt": null, "opts_en": null}, {"id": 164, "level": "avancado", "cat": "Falhas Críticas: Drift-off, Drive-off e Blackout", "tipo": "qa", "q_pt": "Qual é a primeira ação recomendada ao DPO diante de um drive-off?", "a_pt": "Assumir controle manual (joystick) ou zerar os propulsores imediatamente para deter o movimento indevido.", "q_en": "What is the first recommended action for the DPO facing a drive-off?", "a_en": "Take manual (joystick) control or stop and zero the thrusters immediately to halt the improper movement.", "opts_pt": null, "opts_en": null}, {"id": 165, "level": "avancado", "cat": "Falhas Críticas: Drift-off, Drive-off e Blackout", "tipo": "qa", "q_pt": "O que costuma causar um evento de drive-off relacionado a sensores?", "a_pt": "Falha ou erro de um sensor não detectado, aceito pelo sistema de votação, gerando um comando de correção incorreto.", "q_en": "What usually causes a sensor-related drive-off event?", "a_en": "An undetected sensor fault or error accepted by the voting system, generating an incorrect correction command.", "opts_pt": null, "opts_en": null}, {"id": 166, "level": "avancado", "cat": "Falhas Críticas: Drift-off, Drive-off e Blackout", "tipo": "qa", "q_pt": "O que é \"loss of position\" (LOP) em procedimentos DP?", "a_pt": "Situação em que a embarcação excede os limites de excursão de posição/rumo definidos como seguros para a operação.", "q_en": "What is \"loss of position\" (LOP) in DP procedures?", "a_en": "A situation where the vessel exceeds the position or heading excursion limits defined as safe for the ongoing operation.", "opts_pt": null, "opts_en": null}, {"id": 167, "level": "avancado", "cat": "Falhas Críticas: Drift-off, Drive-off e Blackout", "tipo": "qa", "q_pt": "Como a resposta a um blackout total difere da resposta a uma perda parcial de energia?", "a_pt": "No blackout total é preciso religar sequencialmente os geradores e reiniciar o sistema; na perda parcial, o sistema redistribui a carga entre os recursos restantes.", "q_en": "How does the response to a total blackout differ from the response to a partial power loss?", "a_en": "In a total blackout, generators must be sequentially restarted and the system restarted in a controlled manner; in a partial loss, the system tries to automatically redistribute load among the remaining resources.", "opts_pt": null, "opts_en": null}, {"id": 168, "level": "avancado", "cat": "Falhas Críticas: Drift-off, Drive-off e Blackout", "tipo": "qa", "q_pt": "O que é \"blackout recovery time\" e por que é crítico?", "a_pt": "O tempo necessário para restaurar energia e retomar o controle de posição após um blackout; quanto maior, maior o risco de colisão ou dano.", "q_en": "What is \"blackout recovery time\" and why is it critical?", "a_en": "The time needed to restore power and resume position control after a blackout; the longer it is, the greater the risk of collision or damage.", "opts_pt": null, "opts_en": null}, {"id": 169, "level": "avancado", "cat": "Falhas Críticas: Drift-off, Drive-off e Blackout", "tipo": "qa", "q_pt": "Por que um drive-off pode ocorrer mesmo em sistemas DP2/DP3 com redundância completa?", "a_pt": "Porque a redundância protege contra falhas de hardware, mas erros de software ou de sensor não detectados ainda podem gerar comandos incorretos.", "q_en": "Why can a drive-off occur even in DP2/DP3 systems with full redundancy?", "a_en": "Because redundancy protects against hardware failures, but undetected software or sensor errors can still generate incorrect commands.", "opts_pt": null, "opts_en": null}, {"id": 170, "level": "avancado", "cat": "Falhas Críticas: Drift-off, Drive-off e Blackout", "tipo": "qa", "q_pt": "O que é o procedimento de \"emergency disconnect\" associado à perda de posição em perfuração?", "a_pt": "Procedimento para desconectar rapidamente o riser/BOP antes que a excursão de posição exceda os limites seguros.", "q_en": "What is the \"emergency disconnect\" procedure associated with loss of position in drilling?", "a_en": "A procedure to quickly disconnect the riser and BOP before the position excursion exceeds safe limits.", "opts_pt": null, "opts_en": null}, {"id": 171, "level": "avancado", "cat": "Gestão e Votação de Sensores Redundantes", "tipo": "qa", "q_pt": "O que é \"sensor voting\" em DP?", "a_pt": "Processo pelo qual o sistema compara leituras de sensores redundantes e decide quais usar, descartando leituras discrepantes.", "q_en": "What is \"sensor voting\" in DP?", "a_en": "The process by which the system compares readings from redundant sensors and decides which to use, discarding discrepant readings.", "opts_pt": null, "opts_en": null}, {"id": 172, "level": "avancado", "cat": "Gestão e Votação de Sensores Redundantes", "tipo": "qa", "q_pt": "O que é \"median filtering\" na votação de sensores de posição?", "a_pt": "Uso do valor mediano entre múltiplos sensores para reduzir a influência de leituras espúrias de um único sensor.", "q_en": "What is \"median filtering\" in position sensor voting?", "a_en": "Using the median value among multiple sensors to reduce the influence of a spurious reading from a single sensor.", "opts_pt": null, "opts_en": null}, {"id": 173, "level": "avancado", "cat": "Gestão e Votação de Sensores Redundantes", "tipo": "qa", "q_pt": "Por que a simples média entre sensores pode ser perigosa?", "a_pt": "Porque um sensor com erro grande pode distorcer significativamente a média, mesmo que os outros sensores estejam corretos.", "q_en": "Why can a simple average between sensors be dangerous?", "a_en": "Because a sensor with a large error can significantly distort the average, even if the other sensors are correct.", "opts_pt": null, "opts_en": null}, {"id": 174, "level": "avancado", "cat": "Gestão e Votação de Sensores Redundantes", "tipo": "qa", "q_pt": "O que é \"sensor weighting\" dinâmico no sistema DP?", "a_pt": "Ajuste automático da confiança atribuída a cada sensor com base em sua consistência histórica e qualidade de sinal em tempo real.", "q_en": "What is dynamic \"sensor weighting\" in the DP system?", "a_en": "Automatic adjustment of the confidence given to each sensor based on its historical consistency and real-time signal quality.", "opts_pt": null, "opts_en": null}, {"id": 175, "level": "avancado", "cat": "Gestão e Votação de Sensores Redundantes", "tipo": "qa", "q_pt": "O que o operador deve verificar ao receber um alarme de \"reference position rejected\"?", "a_pt": "Qual sensor foi excluído da votação, o motivo, e se a redundância restante ainda é suficiente para a operação.", "q_en": "What should the operator check upon receiving a \"reference position rejected\" alarm?", "a_en": "Which sensor was excluded from voting, the reason why, and whether the remaining redundancy is still sufficient for the operation.", "opts_pt": null, "opts_en": null}, {"id": 176, "level": "avancado", "cat": "Gestão e Votação de Sensores Redundantes", "tipo": "qa", "q_pt": "Como sensores de tecnologias distintas melhoram a robustez da votação?", "a_pt": "Reduzem a chance de erro comum, já que fontes diferentes tendem a falhar por causas independentes.", "q_en": "How do sensors of different technologies improve voting robustness?", "a_en": "They reduce the chance of a common error, since different sources tend to fail from independent causes.", "opts_pt": null, "opts_en": null}, {"id": 177, "level": "avancado", "cat": "Gestão e Votação de Sensores Redundantes", "tipo": "qa", "q_pt": "O que é \"sensor drift\" e como afeta a votação a longo prazo?", "a_pt": "Um desvio gradual e lento na leitura de um sensor, que pode não ser detectado se todos os sensores derivarem de forma semelhante.", "q_en": "What is \"sensor drift\" and how does it affect voting over the long term?", "a_en": "A gradual, slow deviation in a sensor's reading, which may go undetected if all sensors drift in a similar way.", "opts_pt": null, "opts_en": null}, {"id": 178, "level": "avancado", "cat": "Gestão e Votação de Sensores Redundantes", "tipo": "qa", "q_pt": "Por que a votação de giroscópios é geralmente mais simples que a de posição?", "a_pt": "Porque giroscópios modernos têm baixa taxa de erro independente e alta precisão relativa, facilitando identificar divergências.", "q_en": "Why is gyrocompass voting generally simpler than position voting?", "a_en": "Because modern gyrocompasses have a low rate of independent error and high relative accuracy, making divergences easier to identify as a clear fault.", "opts_pt": null, "opts_en": null}, {"id": 179, "level": "avancado", "cat": "Gestão e Votação de Sensores Redundantes", "tipo": "qa", "q_pt": "O que é a lógica \"2 out of 3\" na votação de sensores críticos?", "a_pt": "Com três sensores redundantes, o valor aceito é o concordante entre pelo menos dois, descartando o terceiro se divergente.", "q_en": "What is \"2 out of 3\" logic in critical sensor voting?", "a_en": "With three redundant sensors, the accepted value is the one agreed upon by at least two of them, discarding the third if it diverges.", "opts_pt": null, "opts_en": null}, {"id": 180, "level": "avancado", "cat": "Gestão e Votação de Sensores Redundantes", "tipo": "qa", "q_pt": "Como a perda de todos os sistemas de referência de posição deve ser tratada pelo DPO?", "a_pt": "Como uma emergência (Loss of Position Reference), exigindo transição imediata para controle manual e ativação dos procedimentos de contingência.", "q_en": "How should the loss of all position reference systems be handled by the DPO?", "a_en": "As an emergency (Loss of Position Reference), requiring an immediate transition to manual control and activation of contingency procedures.", "opts_pt": null, "opts_en": null}, {"id": 181, "level": "avancado", "cat": "Estudos de Caso e Lições Aprendidas", "tipo": "qa", "q_pt": "Que tipo de falha é mais citado em investigações de perda de posição em unidades de perfuração?", "a_pt": "Falhas combinadas de sensores de referência de posição associadas a erro humano ou falha de energia não detectada a tempo.", "q_en": "What type of failure is most cited in investigations of loss of position on drilling units?", "a_en": "Combined failures of position reference sensors associated with human error or an undetected power failure.", "opts_pt": null, "opts_en": null}, {"id": 182, "level": "avancado", "cat": "Estudos de Caso e Lições Aprendidas", "tipo": "qa", "q_pt": "Por que investigações de incidentes de DP recomendam melhorias em treinamento além de mudanças técnicas?", "a_pt": "Porque muitos eventos envolvem falha do operador em reconhecer degradação gradual do sistema antes que se tornasse crítica.", "q_en": "Why do DP incident investigations recommend training improvements in addition to technical changes?", "a_en": "Because many events involve the operator failing to recognize gradual degradation of the system before it became critical.", "opts_pt": null, "opts_en": null}, {"id": 183, "level": "avancado", "cat": "Estudos de Caso e Lições Aprendidas", "tipo": "qa", "q_pt": "O que geralmente motiva a revisão de uma FMEA após um incidente real?", "a_pt": "A descoberta de um modo de falha ou interação entre sistemas que não havia sido previsto na análise original.", "q_en": "What usually prompts the review of an FMEA after a real incident?", "a_en": "The discovery of a failure mode or system interaction that had not been foreseen in the original analysis.", "opts_pt": null, "opts_en": null}, {"id": 184, "level": "avancado", "cat": "Estudos de Caso e Lições Aprendidas", "tipo": "qa", "q_pt": "Por que a indústria adotou a certificação obrigatória de DPO após diversos incidentes?", "a_pt": "Para padronizar o nível mínimo de competência e experiência prática exigido para operar sistemas DP com segurança.", "q_en": "Why did the industry adopt mandatory DPO certification after several incidents?", "a_en": "To standardize the minimum level of competence and practical experience required to safely operate DP systems.", "opts_pt": null, "opts_en": null}, {"id": 185, "level": "avancado", "cat": "Estudos de Caso e Lições Aprendidas", "tipo": "qa", "q_pt": "O que caracteriza um \"near miss\" em operações de DP?", "a_pt": "Um evento em que a margem de segurança foi significativamente reduzida sem resultar em excursão real de posição.", "q_en": "What characterizes a \"near miss\" in DP operations?", "a_en": "An event in which the safety margin was significantly reduced without resulting in an actual position excursion.", "opts_pt": null, "opts_en": null}, {"id": 186, "level": "avancado", "cat": "Estudos de Caso e Lições Aprendidas", "tipo": "qa", "q_pt": "Por que transferências de carga entre embarcação e plataforma são de alto risco em DP?", "a_pt": "A proximidade física reduzida aumenta a consequência de qualquer perda de posição, mesmo pequena.", "q_en": "Why are cargo transfers between a vessel and a platform high risk in DP?", "a_en": "The reduced physical proximity increases the consequence of any loss of position, even a small one.", "opts_pt": null, "opts_en": null}, {"id": 187, "level": "avancado", "cat": "Estudos de Caso e Lições Aprendidas", "tipo": "qa", "q_pt": "O que motiva a exigência de revisão da ASOG antes de operações críticas?", "a_pt": "Garantir que toda a equipe compreenda os limites operacionais, os riscos e os procedimentos de contingência antes do início.", "q_en": "What drives the requirement to review the ASOG before critical operations?", "a_en": "Ensuring the whole team understands the operating limits, the risks and the contingency procedures before starting.", "opts_pt": null, "opts_en": null}, {"id": 188, "level": "avancado", "cat": "Estudos de Caso e Lições Aprendidas", "tipo": "qa", "q_pt": "Por que a fadiga do operador é um fator de risco reconhecido em incidentes de DP?", "a_pt": "Reduz a capacidade de monitorar continuamente alarmes e tendências sutis de degradação do sistema.", "q_en": "Why is operator fatigue a recognized risk factor in DP incidents?", "a_en": "It reduces the ability to continuously monitor alarms and subtle trends of system degradation.", "opts_pt": null, "opts_en": null}, {"id": 189, "level": "avancado", "cat": "Estudos de Caso e Lições Aprendidas", "tipo": "qa", "q_pt": "O que verifica uma auditoria periódica de \"DP Trials\"?", "a_pt": "Se a FMEA e a capacidade de redundância da embarcação continuam válidas na prática, geralmente numa verificação anual.", "q_en": "What does a periodic \"DP Trials\" audit verify?", "a_en": "Whether the vessel's FMEA and redundancy capability remain valid in practice, usually checked annually.", "opts_pt": null, "opts_en": null}, {"id": 190, "level": "avancado", "cat": "Estudos de Caso e Lições Aprendidas", "tipo": "qa", "q_pt": "Por que a comunicação inadequada entre a ponte e a sala de máquinas é citada em incidentes de DP?", "a_pt": "Retarda a identificação da causa raiz de uma falha e a resposta coordenada necessária para evitar perda total de posição.", "q_en": "Why is inadequate communication between the bridge and the engine room cited in DP incidents?", "a_en": "It delays identifying the root cause of a failure and the coordinated response needed to prevent total loss of position.", "opts_pt": null, "opts_en": null}, {"id": 191, "level": "avancado", "cat": "Cenários de Simulação", "tipo": "qa", "q_pt": "O que representa o parâmetro \"força de vento\" no simulador DP?", "a_pt": "A intensidade e direção do vento aplicada ao modelo, afetando diretamente a força que os propulsores precisam compensar.", "q_en": "What does the \"wind force\" parameter represent in the DP simulator?", "a_en": "The intensity and direction of wind applied to the model, directly affecting the force the thrusters must compensate.", "opts_pt": null, "opts_en": null}, {"id": 192, "level": "avancado", "cat": "Cenários de Simulação", "tipo": "qa", "q_pt": "O que representa o parâmetro \"corrente marítima\" no simulador?", "a_pt": "Uma força direcional constante que simula o efeito da corrente sobre o casco.", "q_en": "What does the \"sea current\" parameter represent in the simulator?", "a_en": "A constant directional force simulating the effect of current on the hull.", "opts_pt": null, "opts_en": null}, {"id": 193, "level": "avancado", "cat": "Cenários de Simulação", "tipo": "qa", "q_pt": "O que simula o cenário \"perda de thruster\"?", "a_pt": "O desligamento súbito de um propulsor durante a operação, testando a redistribuição de empuxo.", "q_en": "What does the \"thruster loss\" scenario simulate?", "a_en": "The sudden shutdown of a thruster during the operation, testing the redistribution of thrust.", "opts_pt": null, "opts_en": null}, {"id": 194, "level": "avancado", "cat": "Cenários de Simulação", "tipo": "qa", "q_pt": "O que simula o cenário \"blackout parcial\"?", "a_pt": "A perda de uma seção do sistema de energia, reduzindo a capacidade total de propulsão disponível.", "q_en": "What does the \"partial blackout\" scenario simulate?", "a_en": "The loss of one section of the power system, reducing the total available propulsion capacity.", "opts_pt": null, "opts_en": null}, {"id": 195, "level": "avancado", "cat": "Cenários de Simulação", "tipo": "qa", "q_pt": "O que simula o cenário \"falha de sensor de posição\"?", "a_pt": "A degradação ou perda de um sistema de referência, testando a resposta da votação e do operador.", "q_en": "What does the \"position sensor failure\" scenario simulate?", "a_en": "The degradation or loss of a reference system, testing the response of voting and of the operator.", "opts_pt": null, "opts_en": null}, {"id": 196, "level": "avancado", "cat": "Cenários de Simulação", "tipo": "qa", "q_pt": "O que diferencia o \"modelo Kongsberg\" do \"modelo genérico ABB/GE\" no simulador?", "a_pt": "Diferenças na interface, na lógica de alocação de empuxo e na apresentação de alarmes entre arquiteturas comerciais distintas.", "q_en": "What differentiates the \"Kongsberg model\" from the \"generic ABB/GE model\" in the simulator?", "a_en": "Differences in interface, thrust allocation logic and alarm presentation between distinct commercial architectures.", "opts_pt": null, "opts_en": null}, {"id": 197, "level": "avancado", "cat": "Cenários de Simulação", "tipo": "qa", "q_pt": "O que é o \"índice de capacidade residual\" mostrado após uma falha simulada?", "a_pt": "O percentual da capacidade de empuxo total ainda disponível para manter posição após o evento simulado.", "q_en": "What is the \"residual capacity index\" shown after a simulated failure?", "a_en": "The percentage of total thrust capacity still available to hold position after the simulated event.", "opts_pt": null, "opts_en": null}, {"id": 198, "level": "avancado", "cat": "Cenários de Simulação", "tipo": "qa", "q_pt": "Por que o simulador inclui um gráfico polar de capacidade?", "a_pt": "Para visualizar em quais direções a embarcação ainda tem capacidade suficiente de manter posição sob as condições e falhas simuladas.", "q_en": "Why does the simulator include a polar capability chart?", "a_en": "To visualize in which directions the vessel still has enough capacity to hold position under the simulated conditions and failures.", "opts_pt": null, "opts_en": null}, {"id": 199, "level": "avancado", "cat": "Cenários de Simulação", "tipo": "qa", "q_pt": "O que representa o \"raio de tolerância\" na tela do simulador?", "a_pt": "O limite aceitável de excursão de posição ao redor do setpoint antes de ser considerado perda de posição.", "q_en": "What does the \"tolerance radius\" on the simulator screen represent?", "a_en": "The acceptable limit of position excursion around the setpoint before it is considered a loss of position.", "opts_pt": null, "opts_en": null}, {"id": 200, "level": "avancado", "cat": "Cenários de Simulação", "tipo": "qa", "q_pt": "Qual o objetivo pedagógico do modo \"cenário combinado\"?", "a_pt": "Treinar o operador a tomar decisões sob múltiplas falhas/condições simultâneas, como em situações reais de alto risco.", "q_en": "What is the teaching goal of the \"combined scenario\" mode?", "a_en": "To train the operator to make decisions under multiple simultaneous failures and conditions, similar to real high-risk situations.", "opts_pt": null, "opts_en": null}]</script>

/* ---------------- language + pronunciation engine ---------------- */
let speakReg = {}; let speakN = 0;
function registerSpeak(text){ const id = 's'+(speakN++); speakReg[id]=text; return id; }
function speakByRef(id){ speakEnglish(speakReg[id]); }
function speakEnglish(text){
  if(!('speechSynthesis' in window) || !text) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.replace(/["“”]/g,''));
  u.lang = 'en-US'; u.rate = 0.92;
  const voices = window.speechSynthesis.getVoices();
  const v = voices.find(v=>/^en/i.test(v.lang));
  if(v) u.voice = v;
  window.speechSynthesis.speak(u);
}
if('speechSynthesis' in window){ window.speechSynthesis.getVoices(); window.speechSynthesis.onvoiceschanged=()=>{}; }

function fallbackPhon(w){
  let s = w.toLowerCase();
  s = s.replace(/tion$/,'chun').replace(/sion$/,'jun').replace(/ture$/,'tchur').replace(/sure$/,'shur');
  s = s.replace(/ould$/,'ud').replace(/ight/g,'ait').replace(/augh/g,'af').replace(/ough/g,'af');
  s = s.replace(/sh/g,'ch').replace(/wh/g,'u').replace(/th/g,'t').replace(/ph/g,'f').replace(/gh/g,'');
  s = s.replace(/ck/g,'k').replace(/qu/g,'ku').replace(/x/g,'ks');
  s = s.replace(/oo/g,'u').replace(/ee/g,'i').replace(/ea/g,'i');
  s = s.replace(/ai|ay/g,'ei').replace(/oa/g,'ou').replace(/ow/g,'ou');
  s = s.replace(/j/g,'dj').replace(/y/g,'i');
  s = s.replace(/c(?=[eiy])/g,'s').replace(/c/g,'k').replace(/g(?=[eiy])/g,'dj');
  return s;
}
function phonWord(token){
  const clean = token.toLowerCase().replace(/[^a-z']/g,'');
  if(!clean) return token;
  return PHON_DICT[clean] || fallbackPhon(clean);
}
function phonSentence(text){
  const parts = text.match(/[A-Za-z']+|[^A-Za-z']+/g) || [];
  return parts.map(p => /[A-Za-z]/.test(p) ? phonWord(p) : p).join('');
}

/* bi(): renders bilingual content block, always with audio on the EN part. */
function bi(pt, en){
  let html = '';
  if(state.lang==='pt' || state.lang==='pt_en'){
    html += `<div class="txt-pt">${pt}</div>`;
  }
  if(state.lang==='en' || state.lang==='pt_en'){
    const id = registerSpeak(en);
    html += `<div class="txt-en"><span>${en}</span><button class="audio-btn" onclick="event.stopPropagation();speakByRef('${id}')" title="Play">🔊</button></div>`;
    if(state.pron){
      html += `<div class="txt-phon">🗣️ ${phonSentence(en)}</div>`;
    }
  }
  return html;
}

/* ---------------- score helpers ---------------- */
function seenCountForLevel(level){
  const ids = new Set(byLevel(level).map(q=>q.id));
  let n = 0; state.seen.forEach(id=>{ if(ids.has(id)) n++; });
  return n;
}
function scoreForLevel(level){
  const ids = new Set(byLevel(level).map(q=>q.id));
  let answered=0, correct=0;
  Object.keys(state.mcAnswered).forEach(idStr=>{
    const id = +idStr;
    if(ids.has(id)){ answered++; if(state.mcAnswered[idStr].correct) correct++; }
  });
  return {answered, correct};
}
function markAnswered(item, chosenId, correct){
  state.mcAnswered[item.id] = {chosenId, correct};
  state.seen.add(item.id);
  refreshStats();
}

  TABS[state.level].forEach(tb=>{
    const b = document.createElement('button');
    b.className = 'tab-btn' + (state.tab===tb.id ? ' active':'');
    b.textContent = t(tb.key);
    b.onclick = ()=>{ state.tab = tb.id; renderTabs(); renderTab(); };
    wrap.appendChild(b);
  });
}

function renderTab(){
  const c = document.getElementById('content');
  c.innerHTML = '';
  if(state.tab==='qa') return renderQA(c, null);
  if(state.tab==='casos') return renderQA(c, 'Estudos de Caso e Lições Aprendidas');
  if(state.tab==='quiz') return renderQuiz(c);
  if(state.tab==='puzzle') return renderPuzzle(c);
  if(state.tab==='problema') return renderProblema(c);
  if(state.tab==='simulador') return renderSimulador(c);
  if(state.tab==='pronuncia') return renderGlossario(c);
}

/* ---------------- option element (div-based, supports nested audio button) ---------------- */
function makeOptionEl(pt, en, state_, onPick){
  const div = document.createElement('div');
  div.className = 'quiz-opt';
  div.setAttribute('role','button');
  div.setAttribute('tabindex', state_.answered ? '-1' : '0');
  div.innerHTML = bi(pt, en);
  if(state_.answered){
    div.classList.add('disabled');
    if(state_.isCorrectOption) div.classList.add('correct');
    else if(state_.isChosen) div.classList.add('wrong');
  } else {
    const pick = (e)=>{ if(e.target.closest('.audio-btn')) return; onPick(); };
    div.onclick = pick;
    div.onkeydown = (e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); pick(e); } };
  }
  return div;
}

function getMcOptions(basePool, item){
  const key = 'mc_'+item.id;
  if(!state.mcCache[key]){
    const distractors = basePool.filter(q=>q.id!==item.id).sort(()=>Math.random()-0.5).slice(0,3);
    const opts = [...distractors, item].sort(()=>Math.random()-0.5);
    state.mcCache[key] = opts.map(o=>o.id);
  }
  return state.mcCache[key].map(id => basePool.find(p=>p.id===id) || ALL_Q.find(p=>p.id===id));
}

/* ---------------- QA MODE (multiple choice, all 200 browsable) ---------------- */
function renderQA(root, forceCat){
  root.innerHTML = '';
  const level = state.level;
  const pool0 = byLevel(level).filter(q=>q.tipo==='qa');
  const pool = forceCat ? pool0.filter(q=>q.cat===forceCat) : pool0;
  const catList = forceCat ? ['__ALL__'] : cats(level,'qa');
  const activeCat = forceCat ? '__ALL__' : state.qaCat[level];
  const filtered = activeCat==='__ALL__' ? pool : pool.filter(q=>q.cat===activeCat);
  if(state.qaIndex[level] >= filtered.length) state.qaIndex[level]=0;
  const idx = state.qaIndex[level];
  const item = filtered[idx];

  const panel = document.createElement('div'); panel.className='panel';
  const answeredInSet = filtered.filter(q=>state.mcAnswered[q.id]).length;
  const correctInSet = filtered.filter(q=>state.mcAnswered[q.id] && state.mcAnswered[q.id].correct).length;
  const head = document.createElement('div'); head.className='section-head';
  head.innerHTML = `<h2>${forceCat ? t('headCasos') : t('headQA')}</h2>
    <span class="count">${filtered.length} ${t('itemsCount')}<br>${t('answeredLabel')}: ${answeredInSet}/${filtered.length} · ${t('correctLabel')}: ${correctInSet}</span>`;
  panel.appendChild(head);

  if(!forceCat){
    const filt = document.createElement('div'); filt.className='cat-filter';
    catList.forEach(cat=>{
      const p = document.createElement('button');
      p.className='cat-pill'+(activeCat===cat?' active':'');
      p.textContent = cat==='__ALL__' ? t('catAll') : catLabel(cat);
      p.onclick = ()=>{ state.qaCat[level]=cat; state.qaIndex[level]=0; renderQA(root, forceCat); };
      filt.appendChild(p);
    });
    panel.appendChild(filt);
  }

  if(!item){
    panel.innerHTML += `<p style="color:var(--ink-dim)">${t('noItemsCat')}</p>`;
    root.appendChild(panel); return;
  }

  const card = document.createElement('div'); card.className='qa-card';
  card.innerHTML = `<div class="tag">${catLabel(item.cat)}</div><div class="q-block">${bi(item.q_pt, item.q_en)}</div>`;
  const optsWrap = document.createElement('div');
  const already = state.mcAnswered[item.id];
  const options = getMcOptions(pool0, item);
  options.forEach(opt=>{
    const isCorrectOption = opt.id===item.id;
    const isChosen = already && already.chosenId===opt.id;
    const el = makeOptionEl(opt.a_pt, opt.a_en, {answered: !!already, isCorrectOption, isChosen}, ()=>{
      markAnswered(item, opt.id, isCorrectOption);
      renderQA(root, forceCat);
    });
    optsWrap.appendChild(el);
  });
  card.appendChild(optsWrap);
  panel.appendChild(card);

  const nav = document.createElement('div'); nav.className='qa-nav';
  const prevBtn = document.createElement('button'); prevBtn.textContent=t('navPrev');
  prevBtn.disabled = idx===0;
  prevBtn.onclick = ()=>{ state.qaIndex[level]=Math.max(0,idx-1); renderQA(root, forceCat); };
  const nextBtn = document.createElement('button'); nextBtn.textContent=t('navNext');
  nextBtn.disabled = idx>=filtered.length-1;
  nextBtn.onclick = ()=>{ state.qaIndex[level]=Math.min(filtered.length-1,idx+1); renderQA(root, forceCat); };
  const prog = document.createElement('span'); prog.className='qa-progress mono'; prog.textContent = `${idx+1} / ${filtered.length}`;
  nav.appendChild(prevBtn); nav.appendChild(prog); nav.appendChild(nextBtn);
  panel.appendChild(nav);

  root.appendChild(panel);
}

/* ---------------- QUIZ MODE (10-question timed session) ---------------- */
function buildQuiz(level){
  const pool = byLevel(level).filter(q=>q.tipo==='qa');
  const shuffled = [...pool].sort(()=>Math.random()-0.5).slice(0,10);
  const questions = shuffled.map(item=>{
    const distractors = pool.filter(q=>q.id!==item.id).sort(()=>Math.random()-0.5).slice(0,3);
    const options = [...distractors, item].sort(()=>Math.random()-0.5);
    return {qItem:item, cat:item.cat, correctId:item.id, options};
  });
  return {questions, i:0, score:0, answeredThis:false};
}

function renderQuiz(root){
  root.innerHTML = '';
  if(!state.quiz || state.quiz.level!==state.level){
    state.quiz = buildQuiz(state.level); state.quiz.level = state.level;
  }
  const quiz = state.quiz;
  const panel = document.createElement('div'); panel.className='panel';

  if(quiz.i >= quiz.questions.length){
    const pct = Math.round(100*quiz.score/quiz.questions.length);
    state.lastQuizScore[state.level] = `${quiz.score}/${quiz.questions.length}`;
    refreshStats();
    const resultMsg = pct>=80 ? t('resultExcellent') : pct>=50 ? t('resultGood') : t('resultPoor');
    panel.innerHTML = `
      <div class="quiz-result">
        <div class="big">${quiz.score}/${quiz.questions.length}</div>
        <p>${pct}% ${t('accuracyLabel')} — ${resultMsg}</p>
      </div>`;
    const btn = document.createElement('button'); btn.className='btn-primary'; btn.style.display='block'; btn.style.margin='0 auto';
    btn.textContent = t('btnRetakeQuiz');
    btn.onclick = ()=>{ state.quiz = buildQuiz(state.level); state.quiz.level = state.level; renderQuiz(root); };
    panel.appendChild(btn); root.appendChild(panel); return;
  }

  const q = quiz.questions[quiz.i];
  const bar = document.createElement('div'); bar.className='quiz-progress-bar';
  bar.innerHTML = `<div style="width:${100*quiz.i/quiz.questions.length}%"></div>`;
  panel.appendChild(bar);

  const tag = document.createElement('div'); tag.className='mono'; tag.style.fontSize='10px'; tag.style.color='var(--level-accent)'; tag.style.letterSpacing='1px'; tag.style.textTransform='uppercase'; tag.style.marginBottom='8px';
  tag.textContent = `${catLabel(q.cat)} · ${t('wordQuestion')} ${quiz.i+1} ${t('wordOf')} ${quiz.questions.length}`;
  panel.appendChild(tag);

  const qEl = document.createElement('div'); qEl.className='quiz-q';
  qEl.innerHTML = bi(q.qItem.q_pt, q.qItem.q_en);
  panel.appendChild(qEl);

  q.options.forEach(optItem=>{
    const isCorrectOption = optItem.id===q.correctId;
    const el = makeOptionEl(optItem.a_pt, optItem.a_en, {answered:false}, ()=>{
      quiz.answeredThis = true;
      if(isCorrectOption) quiz.score++;
      [...panel.querySelectorAll('.quiz-opt')].forEach((o,i)=>{
        o.classList.add('disabled'); o.tabIndex=-1;
        if(q.options[i].id===q.correctId) o.classList.add('correct');
        else if(q.options[i].id===optItem.id) o.classList.add('wrong');
      });
      footer.querySelector('.btn-primary').disabled = false;
    });
    panel.appendChild(el);
  });

  const footer = document.createElement('div'); footer.className='quiz-footer';
  const score = document.createElement('div'); score.className='quiz-score'; score.textContent = `${t('scoreLabel')}: ${quiz.score}`;
  const next = document.createElement('button'); next.className='btn-primary';
  next.textContent = quiz.i===quiz.questions.length-1 ? t('btnSeeResult') : t('btnNext');
  next.disabled = true;
  next.onclick = ()=>{ quiz.i++; quiz.answeredThis=false; renderQuiz(root); };
  footer.appendChild(score); footer.appendChild(next);
  panel.appendChild(footer);

  root.appendChild(panel);
}

/* ---------------- PUZZLE MODE (basico only) ---------------- */
function renderPuzzle(root){
  root.innerHTML = '';
  const pool = byLevel('basico').filter(q=>q.tipo==='puzzle');
  if(!state.puzzleOrder || state.puzzleOrder.level!=='basico'){
    state.puzzleOrder = {level:'basico', order: pool.map(q=>q.id).sort(()=>Math.random()-0.5), i:0, score:0};
  }
  const po = state.puzzleOrder;
  const panel = document.createElement('div'); panel.className='panel';
  const head = document.createElement('div'); head.className='section-head';
  head.innerHTML = `<h2>${t('headPuzzle')}</h2><span class="count">${po.i}/${po.order.length} · ${t('correctWord')}: ${po.score}</span>`;
  panel.appendChild(head);

  if(po.i >= po.order.length){
    panel.innerHTML += `<div class="quiz-result"><div class="big">${po.score}/${po.order.length}</div><p>${t('puzzleResultSuffix')}</p></div>`;
    const btn = document.createElement('button'); btn.className='btn-primary'; btn.style.display='block'; btn.style.margin='0 auto';
    btn.textContent=t('btnPlayAgain');
    btn.onclick=()=>{ state.puzzleOrder=null; renderPuzzle(root); };
    panel.appendChild(btn); root.appendChild(panel); return;
  }

  const item = pool.find(q=>q.id===po.order[po.i]);
  const qEl = document.createElement('div'); qEl.className='quiz-q';
  qEl.innerHTML = bi(item.q_pt, item.q_en);
  panel.appendChild(qEl);

  const n = item.opts_pt.length;
  for(let i=0;i<n;i++){
    const isCorrectOption = item.opts_pt[i]===item.a_pt;
    const el = makeOptionEl(item.opts_pt[i], item.opts_en[i], {answered:false}, ()=>{
      po.answered = true;
      if(isCorrectOption) po.score++;
      [...panel.querySelectorAll('.quiz-opt')].forEach((o,j)=>{
        o.classList.add('disabled'); o.tabIndex=-1;
        if(item.opts_pt[j]===item.a_pt) o.classList.add('correct');
        else if(j===i) o.classList.add('wrong');
      });
      nextBtn.disabled=false;
    });
    panel.appendChild(el);
  }

  const nextBtn = document.createElement('button'); nextBtn.className='btn-primary'; nextBtn.style.marginTop='10px';
  nextBtn.textContent=t('btnNextTerm'); nextBtn.disabled=true;
  nextBtn.onclick=()=>{ po.i++; po.answered=false; renderPuzzle(root); };
  panel.appendChild(nextBtn);

  root.appendChild(panel);
}

  platform: {x:6, y:-10},
  tug: {x:-8, y:-9},
};
const LASER_FOV_HALF = 65;   // degrees either side of the bow
const LASER_MAX_RANGE = 25;  // meters (in this simulator's compressed scale)
const THRUSTERS = [
  {id:'bt1', key:'thrBowTunnel1', azimuth:false},
  {id:'bt2', key:'thrBowTunnel2', azimuth:false},
  {id:'sazp', key:'thrSternAzPort', azimuth:true},

function statusLevel(excursion){ return excursion<1.5 ? 'ok' : excursion<4 ? 'warn' : 'bad'; }
function laserLockCheck(x,y,heading){
  if(!sim.refType || sim.refType==='none') return null;
  const rp = REF_POS[sim.refType];
  const dxr=rp.x-x, dyr=rp.y-y;
  const dist=Math.sqrt(dxr*dxr+dyr*dyr);
  const bearing=Math.atan2(dxr,-dyr)*180/Math.PI;
  const rel=((bearing-heading+540)%360)-180;
  return Math.abs(rel)<=LASER_FOV_HALF && dist<=LASER_MAX_RANGE;
}
function pushAlarm(text, level){
  sim.alarms.unshift({time: sim.t, text, level});
  if(sim.alarms.length>14) sim.alarms.length = 14;

}

  };
  document.getElementById('s-philosophy').onchange = e=>{ sim.philosophy=e.target.value; };
  document.getElementById('s-reftype').onchange = e=>{ sim.refType=e.target.value; sim.prevLaserLock=null; if(!sim.running) renderActiveScreen(); };
  document.getElementById('s-start').onclick = ()=>{
    sim.running = !sim.running;
    document.getElementById('s-start').textContent = sim.running ? t('btnPause') : t('btnResume');
    if(sim.running) simLoop();
  };
  document.getElementById('s-reset').onclick = ()=>{
    sim.running=false; if(sim.raf) cancelAnimationFrame(sim.raf);
    sim.t=0; sim.posX=0; sim.posY=0; sim.velX=0; sim.velY=0; sim.heading=0; sim.yawRate=0; sim.trail=[];
    sim.alarms=[]; sim.prevStatus='ok'; sim.prevLaserLock=null;
    document.getElementById('s-start').textContent=t('btnStart');
    renderActiveScreen();
  };

  renderActiveScreen();
}

function renderActiveScreen(){
  const content = document.getElementById('sim-screen-content');
  if(!content) return;
  if(sim.screen==='posicao'){
    content.innerHTML = `
      <svg id="sim-svg" viewBox="0 0 300 300"></svg>
      <div class="sim-readout">
        <div class="ro"><div class="l">${t('roExcursion')}</div><div class="v" id="ro-pos">0.0 m</div></div>
        <div class="ro"><div class="l">${t('roCapacity')}</div><div class="v ok" id="ro-cap">100%</div></div>
        <div class="ro"><div class="l">${t('roHeading')}</div><div class="v" id="ro-heading">000°</div></div>
        <div class="ro"><div class="l">${t('roSpeed')}</div><div class="v" id="ro-speed">0.0 m/min</div></div>
        <div class="ro"><div class="l">${t('roStatus')}</div><div class="v ok" id="ro-status">${t('statusOk')}</div></div>
        <div class="ro"><div class="l">${t('roTime')}</div><div class="v" id="ro-time">0 s</div></div>
        <div class="ro" style="grid-column:1 / span 2;"><div class="l">${t('roLaser')}</div><div class="v" id="ro-laser">—</div></div>
      </div>`;
    drawSim(100,0,0);
  } else if(sim.screen==='energia'){
    content.innerHTML = `
      <svg id="sim-svg-pms" viewBox="0 0 300 220"></svg>
      <div class="sim-readout">
        <div class="ro"><div class="l">${t('pmsFreq')}</div><div class="v ok" id="ro-freq">60.0 Hz</div></div>
        <div class="ro"><div class="l">${t('pmsVoltage')}</div><div class="v" id="ro-volt">6600 V</div></div>
        <div class="ro"><div class="l">${t('pmsLoad')}</div><div class="v ok" id="ro-load">0%</div></div>
        <div class="ro"><div class="l">${t('pmsBus')}</div><div class="v ok" id="ro-bus">${t('busClosed')}</div></div>
      </div>`;
    drawPMS();
  } else if(sim.screen==='propulsores'){
    content.innerHTML = `<div class="thr-grid" id="thr-grid"></div>`;
    drawThrusters();
  } else if(sim.screen==='alarmes'){
    content.innerHTML = `<div class="alarm-list" id="alarm-list"></div>`;
    renderAlarmList();
  }
}

function renderAlarmList(){
  const list = document.getElementById('alarm-list');
  if(!list) return;
  if(sim.alarms.length===0){
    list.innerHTML = `<div class="alarm-empty">${t('noAlarms')}</div>`;
    return;
  }
  list.innerHTML = sim.alarms.map(a=>{
    const mm = Math.floor(a.time/60).toString().padStart(2,'0');
    const ss = Math.floor(a.time%60).toString().padStart(2,'0');
    return `<div class="alarm-item ${a.level}"><span class="alarm-time">${mm}:${ss}</span><span>${a.text}</span></div>`;
  }).join('');
}

function capacityFactor(){
  switch(sim.scenario){
    case 'thruster': return 0.72;
    case 'blackout': return 0.55;
    case 'sensor': return 0.9;
    default: return 1.0;
  }
}

function simLoop(){
  if(!sim.running) return;
  sim.t += 0.1;
  const windRad = sim.windDir*Math.PI/180;
  const currRad = sim.currDir*Math.PI/180;
  const windForce = 0.012*sim.windSpeed*sim.windSpeed;
  const currForce = 3.2*sim.currSpeed*sim.currSpeed;
  let fx = Math.sin(windRad)*windForce + Math.sin(currRad)*currForce;
  let fy = -Math.cos(windRad)*windForce - Math.cos(currRad)*currForce;
  if(sim.scenario==='sensor'){ fx += Math.sin(sim.t*0.7)*0.6; fy += Math.cos(sim.t*0.5)*0.6; }
  const cap = capacityFactor();
  const demand = Math.sqrt(fx*fx+fy*fy);
  const available = 14*cap;
  const compensated = Math.min(1, available/Math.max(demand,0.001));
  const netX = fx*(1-compensated); const netY = fy*(1-compensated);
  sim.velX = sim.velX*0.9 + netX*0.15; sim.velY = sim.velY*0.9 + netY*0.15;
  sim.posX += sim.velX*0.4; sim.posY += sim.velY*0.4;
  const magNow = Math.sqrt(sim.posX*sim.posX+sim.posY*sim.posY);
  const MAX_EXCURSION = 60;
  if(magNow > MAX_EXCURSION){
    const s = MAX_EXCURSION/magNow;
    sim.posX *= s; sim.posY *= s;
  }

  const envAngle = Math.atan2(fx, -fy) * 180/Math.PI;
  let headingError = ((envAngle - sim.heading + 540) % 360) - 180;
  const weatherTorque = headingError * 0.018 * (1 - compensated);
  sim.yawRate = sim.yawRate*0.92 + weatherTorque*0.08 + Math.sin(sim.t*0.15)*0.012;
  sim.heading += sim.yawRate;

  sim.trail.push({x:sim.posX, y:sim.posY});
  if(sim.trail.length>45) sim.trail.shift();

  const excursion = Math.sqrt(sim.posX*sim.posX+sim.posY*sim.posY);
  const capPct = Math.round(Math.min(100, compensated*100));
  const speed = Math.sqrt(sim.velX*sim.velX+sim.velY*sim.velY)*15;

  const curStatus = statusLevel(excursion);
  if(curStatus !== sim.prevStatus){
    if(curStatus==='bad') pushAlarm(t('alarmLossOfPosition'), 'bad');
    else if(curStatus==='warn' && sim.prevStatus==='ok') pushAlarm(t('alarmDrifting'), 'warn');
    else if(curStatus==='ok') pushAlarm(t('alarmPositionRestored'), 'ok');
    sim.prevStatus = curStatus;
  }
  const curLock = laserLockCheck(sim.posX, sim.posY, sim.heading);
  if(curLock!==null && curLock!==sim.prevLaserLock){
    pushAlarm(curLock ? t('alarmLaserRestored') : t('alarmLaserLost'), curLock?'ok':'bad');
    sim.prevLaserLock = curLock;
  }

  if(sim.screen==='posicao') drawSim(capPct, sim.posX, sim.posY, excursion, speed, fx, fy, compensated);
  else if(sim.screen==='energia') drawPMS();
  else if(sim.screen==='propulsores') drawThrusters(fx, fy, compensated);
  sim.raf = requestAnimationFrame(simLoop);
}

function shipSvg(id, scale, fillColor, strokeColor){
  return `<g id="${id}" transform="scale(${scale})">
    <path d="M0,-19 L4.5,-13 Q6,-6 6,4 Q6,13 3,16 Q0,18.5 -3,16 Q-6,13 -6,4 Q-6,-6 -4.5,-13 Z"
      fill="${fillColor}" stroke="${strokeColor}" stroke-width="1"/>
    <rect x="-3.4" y="-11" width="6.8" height="7" rx="1" fill="${strokeColor}" opacity="0.55"/>
    <rect x="-2" y="6" width="4" height="5" rx="0.8" fill="${strokeColor}" opacity="0.35"/>
    <circle cx="0" cy="-16.5" r="1.3" fill="${strokeColor}" opacity="0.7"/>
    <circle cx="-3.6" cy="13" r="1.3" fill="${strokeColor}" opacity="0.7"/>
    <circle cx="3.6" cy="13" r="1.3" fill="${strokeColor}" opacity="0.7"/>
  </g>`;
}

function platformSvg(color){
  return `
    <rect x="-11" y="-11" width="22" height="22" fill="#263349" stroke="${color}" stroke-width="1.2"/>
    <line x1="-11" y1="-11" x2="11" y2="11" stroke="${color}" stroke-width="0.6" opacity="0.4"/>
    <line x1="11" y1="-11" x2="-11" y2="11" stroke="${color}" stroke-width="0.6" opacity="0.4"/>
    <circle cx="-9" cy="-9" r="1.6" fill="${color}"/>
    <circle cx="9" cy="-9" r="1.6" fill="${color}"/>
    <circle cx="-9" cy="9" r="1.6" fill="${color}"/>
    <circle cx="9" cy="9" r="1.6" fill="${color}"/>
    <rect x="-3" y="-3" width="6" height="6" fill="${color}" opacity="0.6"/>
  `;
}

function gaugeSvg(cx, cy, dirDeg, magnitude, maxMag, color, label){
  const len = 8 + Math.min(1, magnitude/maxMag)*16;
  const rad = dirDeg*Math.PI/180;
  const x2 = cx + Math.sin(rad)*len, y2 = cy - Math.cos(rad)*len;
  return `
    <circle cx="${cx}" cy="${cy}" r="19" fill="#0C1826" stroke="${color}" stroke-width="1" opacity="0.9"/>
    <line x1="${cx}" y1="${cy}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${color}" stroke-width="2.4" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="1.6" fill="${color}"/>
    <text x="${cx}" y="${cy+29}" text-anchor="middle" font-size="8" fill="${color}" font-family="JetBrains Mono, monospace">${label}</text>
  `;
}

function drawSim(capPct, x, y, excursion, speed, fx, fy, compensated){
  excursion = excursion===undefined ? Math.sqrt(x*x+y*y) : excursion;
  const svg = document.getElementById('sim-svg');
  if(!svg) return;
  const accent = '#E7A94A';
  const cx=150, cy=150;
  const px = cx + Math.max(-78,Math.min(78,x*6));
  const py = cy + Math.max(-78,Math.min(78,y*6));
  const status = excursion<1.5 ? {t:t('statusOk'), c:'ok'} : excursion<4 ? {t:t('statusWarn'), c:'warn'} : {t:t('statusBad'), c:'bad'};
  const ringColor = status.c==='ok' ? '#35D6C0' : status.c==='warn' ? '#E7A94A' : '#E85C4E';
  const heading = sim.heading || 0;
  const bob = Math.sin(sim.t*0.4)*0.5;
  const roll = Math.sin(sim.t*0.3)*1.2;

  const trailPts = (sim.trail||[]).map((p,i)=>{
    const tx = cx + Math.max(-78,Math.min(78,p.x*6));
    const ty = cy + Math.max(-78,Math.min(78,p.y*6));
    const op = 0.06 + 0.5*(i/(sim.trail.length||1));
    return `<circle cx="${tx.toFixed(1)}" cy="${ty.toFixed(1)}" r="1.6" fill="${ringColor}" opacity="${op.toFixed(2)}"/>`;
  }).join('');

  let thrustArrow = '';
  if(fx!==undefined && compensated!==undefined){
    const thrustAngle = Math.atan2(-fx, fy);
    const tlen = 12 + compensated*16;
    const tx2 = px + Math.sin(thrustAngle)*tlen;
    const ty2 = py - Math.cos(thrustAngle)*tlen;
    thrustArrow = `<line x1="${px.toFixed(1)}" y1="${py.toFixed(1)}" x2="${tx2.toFixed(1)}" y2="${ty2.toFixed(1)}" stroke="${ringColor}" stroke-width="2" opacity="0.85" marker-end="url(#arrowhead)"/>`;
  }

  let refGraphic = '', laserGraphic = '';
  let laserStatusText = '—', laserStatusClass = '';
  if(sim.refType && sim.refType!=='none'){
    const rp = REF_POS[sim.refType];
    const rpx = cx + Math.max(-130,Math.min(130, rp.x*6));
    const rpy = cy + Math.max(-130,Math.min(130, rp.y*6));
    const dxr = rp.x - x, dyr = rp.y - y;
    const distToRef = Math.sqrt(dxr*dxr+dyr*dyr);
    const bearingToRef = Math.atan2(dxr, -dyr)*180/Math.PI;
    let relBearing = ((bearingToRef - heading + 540)%360)-180;
    const locked = Math.abs(relBearing) <= LASER_FOV_HALF && distToRef <= LASER_MAX_RANGE;
    const laserColor = locked ? '#7FE8D6' : '#E85C4E';
    laserGraphic = `<line x1="${px.toFixed(1)}" y1="${py.toFixed(1)}" x2="${rpx.toFixed(1)}" y2="${rpy.toFixed(1)}" stroke="${laserColor}" stroke-width="${locked?1.4:1}" opacity="${locked?0.85:0.45}" stroke-dasharray="${locked?'0':'4,3'}"/>`;
    const refIcon = sim.refType==='platform'
      ? platformSvg('#9FB4C9')
      : shipSvg('reftug', 1.1, '#33455E', '#9FB4C9');
    refGraphic = `<g transform="translate(${rpx.toFixed(1)},${rpy.toFixed(1)})">${refIcon}
      <circle cx="0" cy="0" r="2" fill="#fff" opacity="0.9"/>
    </g>`;
    laserStatusText = distToRef.toFixed(1)+' m · '+(locked ? t('laserActive') : t('laserLost'));
    laserStatusClass = locked ? 'ok' : 'bad';
  }

  svg.innerHTML = `
    <defs>
      <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="${ringColor}"/>
      </marker>
    </defs>
    <circle cx="${cx}" cy="${cy}" r="98" fill="none" stroke="${accent}" stroke-width="1" opacity="0.15"/>
    <circle cx="${cx}" cy="${cy}" r="68" fill="none" stroke="${accent}" stroke-width="1" opacity="0.25"/>
    <circle cx="${cx}" cy="${cy}" r="30" fill="none" stroke="${ringColor}" stroke-width="1.3" opacity="0.7"/>
    <line x1="${cx}" y1="42" x2="${cx}" y2="258" stroke="${accent}" stroke-width="0.5" opacity="0.12"/>
    <line x1="42" y1="${cy}" x2="258" y2="${cy}" stroke="${accent}" stroke-width="0.5" opacity="0.12"/>
    <path d="M${cx},${cy-14} L${cx+8},${cy+18} L${cx},${cy+11} L${cx-8},${cy+18} Z" fill="${accent}" opacity="0.35"/>
    ${trailPts}
    ${refGraphic}
    ${laserGraphic}
    ${thrustArrow}
    <g transform="translate(${px.toFixed(1)},${(py+bob).toFixed(1)}) rotate(${(heading+roll).toFixed(1)})">
      ${shipSvg('tug', 1.35, '#2C3B52', ringColor)}
    </g>
    <circle cx="${cx}" cy="${cy}" r="2" fill="#E7EEF6"/>
    ${gaugeSvg(38, 38, sim.windDir, sim.windSpeed, 45, '#7FD9F0', t('wind').toUpperCase())}
    ${gaugeSvg(262, 38, sim.currDir, sim.currSpeed, 3, '#35D6C0', t('current').toUpperCase())}
  `;
  const roPos = document.getElementById('ro-pos'); const roCap = document.getElementById('ro-cap');
  const roStatus = document.getElementById('ro-status'); const roTime = document.getElementById('ro-time');
  const roHeading = document.getElementById('ro-heading'); const roSpeed = document.getElementById('ro-speed');
  const roLaser = document.getElementById('ro-laser');
  if(roPos) roPos.textContent = excursion.toFixed(1)+' m';
  if(roCap){ roCap.textContent = capPct+'%'; roCap.className='v '+(capPct>85?'ok':capPct>60?'warn':'bad'); }
  if(roStatus){ roStatus.textContent = status.t; roStatus.className='v '+status.c; }
  if(roTime) roTime.textContent = Math.round(sim.t)+' s';
  if(roHeading) roHeading.textContent = (((Math.round(heading)%360)+360)%360).toString().padStart(3,'0')+'°';
  if(roSpeed) roSpeed.textContent = (speed||0).toFixed(1)+' m/min';
  if(roLaser){ roLaser.textContent = laserStatusText; roLaser.className = 'v '+laserStatusClass; }
}

function pmsValues(){
  const blackout = sim.scenario==='blackout';
  const baseLoad = Math.min(95, 30 + sim.windSpeed*1.1 + sim.currSpeed*8);
  const load1 = Math.round(blackout ? Math.min(98, baseLoad*1.7) : baseLoad*0.55);
  const load2 = Math.round(blackout ? 0 : baseLoad*0.55);
  const freq = blackout ? Math.max(56, 59.6 - Math.max(0,load1-90)*0.15) : 60.0;
  return {load1, load2, freq, busClosed: !blackout, voltage: blackout ? 6350 : 6600};
}

function genBoxSvg(x, load, tripped, label){
  const barH = 34, barW = 12;
  const fillH = tripped ? 0 : Math.round(barH*Math.min(100,load)/100);
  const color = tripped ? '#E85C4E' : load>90 ? '#E7A94A' : '#35D6C0';
  return `
    <rect x="${x-32}" y="18" width="64" height="52" rx="4" fill="#182437" stroke="${color}" stroke-width="1.3"/>
    <text x="${x}" y="32" text-anchor="middle" font-size="10" font-weight="700" fill="${color}" font-family="Chakra Petch, sans-serif">${label}</text>
    <rect x="${x-8}" y="36" width="${barW}" height="${barH}" fill="#0C1826" stroke="${color}" stroke-width="0.8"/>
    <rect x="${x-8}" y="${36+barH-fillH}" width="${barW}" height="${fillH}" fill="${color}"/>
    ${tripped
      ? `<line x1="${x-9}" y1="35" x2="${x+9}" y2="71" stroke="#E85C4E" stroke-width="2"/><line x1="${x+9}" y1="35" x2="${x-9}" y2="71" stroke="#E85C4E" stroke-width="2"/>`
      : `<text x="${x}" y="66" text-anchor="middle" font-size="8" fill="${color}" font-family="JetBrains Mono, monospace">${Math.round(load)}%</text>`}
  `;
}

function drawPMS(){
  const svg = document.getElementById('sim-svg-pms');
  if(!svg) return;
  const v = pmsValues();
  const gen1Color = v.load1>90 ? '#E7A94A' : '#35D6C0';
  const gen2Color = !v.busClosed ? '#E85C4E' : (v.load2>90 ? '#E7A94A' : '#35D6C0');
  const tieColor = v.busClosed ? '#35D6C0' : '#E85C4E';
  svg.innerHTML = `
    ${genBoxSvg(75, v.load1, false, t('genLabel')+' 1')}
    ${genBoxSvg(225, v.load2, !v.busClosed, t('genLabel')+' 2')}
    <line x1="75" y1="70" x2="75" y2="110" stroke="${gen1Color}" stroke-width="2"/>
    <line x1="225" y1="70" x2="225" y2="110" stroke="${gen2Color}" stroke-width="2"/>
    <line x1="75" y1="110" x2="135" y2="110" stroke="${gen1Color}" stroke-width="2.5"/>
    <line x1="165" y1="110" x2="225" y2="110" stroke="${v.busClosed?tieColor:'#3A4A5E'}" stroke-width="2.5" stroke-dasharray="${v.busClosed?'0':'5,4'}"/>
    <rect x="135" y="102" width="30" height="16" rx="2" fill="#182437" stroke="${tieColor}" stroke-width="1.3"/>
    <text x="150" y="113" text-anchor="middle" font-size="7" fill="${tieColor}" font-family="JetBrains Mono, monospace">BTB</text>
    <line x1="110" y1="110" x2="110" y2="150" stroke="${gen1Color}" stroke-width="1.6"/>
    <line x1="190" y1="110" x2="190" y2="150" stroke="${v.busClosed?tieColor:'#3A4A5E'}" stroke-width="1.6"/>
    <rect x="70" y="150" width="80" height="34" rx="4" fill="#182437" stroke="${gen1Color}" stroke-width="1.1"/>
    <text x="110" y="171" text-anchor="middle" font-size="9" fill="${gen1Color}" font-family="Chakra Petch, sans-serif">${t('pmsThrustersLoad')}</text>
    <rect x="150" y="150" width="80" height="34" rx="4" fill="#182437" stroke="${v.busClosed?'#5A7089':'#3A4A5E'}" stroke-width="1.1"/>
    <text x="190" y="171" text-anchor="middle" font-size="9" fill="${v.busClosed?'#9FB4C9':'#5A7089'}" font-family="Chakra Petch, sans-serif">${t('pmsAuxLoad')}</text>
  `;
  const roFreq = document.getElementById('ro-freq'); const roVolt = document.getElementById('ro-volt');
  const roLoad = document.getElementById('ro-load'); const roBus = document.getElementById('ro-bus');
  if(roFreq){ roFreq.textContent = v.freq.toFixed(1)+' Hz'; roFreq.className='v '+(v.freq<58?'bad':v.freq<59.5?'warn':'ok'); }
  if(roVolt) roVolt.textContent = v.voltage+' V';
  if(roLoad){ const tot=Math.round((v.load1+v.load2)/2); roLoad.textContent=tot+'%'; roLoad.className='v '+(tot>85?'bad':tot>65?'warn':'ok'); }
  if(roBus){ roBus.textContent = v.busClosed ? t('busClosed') : t('busOpen'); roBus.className='v '+(v.busClosed?'ok':'bad'); }
}

function drawThrusters(fx, fy, compensated){
  const gridEl = document.getElementById('thr-grid');
  if(!gridEl) return;
  const demand = Math.sqrt((fx||0)*(fx||0)+(fy||0)*(fy||0));
  const baseLoad = Math.min(100, 15 + (demand/14)*100*(compensated===undefined?1:compensated));
  const envAngleDeg = Math.atan2(fx||0, -(fy||0))*180/Math.PI;
  const failedIdx = sim.scenario==='thruster' ? FAILED_THRUSTER_IDX : -1;
  gridEl.innerHTML = THRUSTERS.map((th,i)=>{
    const failed = i===failedIdx;
    const jitter = Math.sin(sim.t*0.5+i)*6;
    const load = failed ? 0 : Math.max(5, Math.min(100, Math.round(baseLoad+jitter)));
    const rpm = failed ? 0 : Math.round(load*8.4);
    const angle = (!failed && th.azimuth) ? Math.round((((envAngleDeg+180)+(i===2?-18:18))%360+360)%360) : null;
    const barColor = failed ? 'var(--red)' : load>85 ? 'var(--amber)' : 'var(--level-accent)';
    return `
      <div class="thr-card ${failed?'failed':''}">
        <div class="thr-name">${t(th.key)}</div>
        <div class="thr-bar"><div class="thr-bar-fill" style="width:${load}%;background:${barColor}"></div></div>
        <div class="thr-meta">${failed ? t('thrFailed') : `${t('thrLoad')} ${load}% · ${t('thrRpm')} ${rpm}${angle!==null?' · '+t('thrAngle')+' '+angle+'°':''}`}</div>
      </div>`;
  }).join('');
}

    state.lang = b.dataset.val;
    document.getElementById('lang-switch').querySelectorAll('button').forEach(x=>x.classList.toggle('active', x===b));
    refreshChrome(); updateHeroText(); refreshStats(); renderTabs(); renderTab();
  };
});
document.getElementById('pron-toggle').onchange = e=>{ state.pron = e.target.checked; renderTab(); };

/* ---------------- init ---------------- */
setLevel('basico');
