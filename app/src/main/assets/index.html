<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DP OFFSHORE TRAINER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A1420; --panel:#111E30; --panel2:#16263C; --line:#22334A;
  --cyan:#35D6C0; --cyan-dim:#1E4A45; --amber:#E7A94A; --amber-dim:#4A3A20;
  --red:#E85C4E; --ink:#E7EEF6; --ink-dim:#87A0B6; --ink-faint:#4E657C;
  --level-accent:#35D6C0; --level-accent-dim:#1E4A45;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;}
body{min-height:100vh;padding-bottom:40px;}
body[data-level="avancado"]{--level-accent:#E7A94A;--level-accent-dim:#4A3A20;}
.mono{font-family:'JetBrains Mono',monospace;}
.disp{font-family:'Chakra Petch',sans-serif;}

.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;background:linear-gradient(180deg,#0C1826,rgba(12,24,38,0.92));
  border-bottom:1px solid var(--line);backdrop-filter:blur(6px);}
.brand{display:flex;align-items:center;gap:10px;}
.brand svg{width:30px;height:30px;flex:none;}
.brand-text .t1{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.5px;line-height:1.1;}
.brand-text .t2{font-size:10px;color:var(--ink-dim);letter-spacing:1.5px;text-transform:uppercase;}
.level-switch{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:3px;gap:2px;}
.level-switch button{border:none;background:transparent;color:var(--ink-dim);font-family:'Chakra Petch',sans-serif;
  font-size:12px;font-weight:600;letter-spacing:0.5px;padding:7px 13px;border-radius:16px;cursor:pointer;transition:all .2s;}
.level-switch button.active{background:var(--level-accent);color:#08131c;}

.settings-bar{display:flex;align-items:center;justify-content:center;gap:22px;flex-wrap:wrap;
  padding:10px 18px;background:var(--panel);border-bottom:1px solid var(--line);}
.settings-group{display:flex;align-items:center;gap:9px;}
.settings-label{font-size:11.5px;color:var(--ink-dim);white-space:nowrap;}
.seg-control{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:2px;}
.seg-control button{border:none;background:transparent;color:var(--ink-dim);font-family:'JetBrains Mono',monospace;
  font-size:11.5px;font-weight:700;padding:6px 11px;border-radius:7px;cursor:pointer;letter-spacing:0.3px;}
.seg-control button.active{background:var(--level-accent);color:#08131c;}
.switch{position:relative;display:inline-block;width:38px;height:22px;flex:none;}
.switch input{opacity:0;width:0;height:0;}
.slider-toggle{position:absolute;cursor:pointer;inset:0;background:var(--panel2);border:1px solid var(--line);
  border-radius:22px;transition:.2s;}
.slider-toggle:before{position:absolute;content:"";height:16px;width:16px;left:2px;bottom:2px;
  background:var(--ink-faint);border-radius:50%;transition:.2s;}
.switch input:checked + .slider-toggle{background:var(--level-accent-dim);border-color:var(--level-accent);}
.switch input:checked + .slider-toggle:before{transform:translateX(16px);background:var(--level-accent);}

.hero{display:grid;grid-template-columns:minmax(200px,260px) 1fr;gap:22px;padding:22px 18px 6px;
  max-width:1080px;margin:0 auto;align-items:center;}
@media (max-width:640px){.hero{grid-template-columns:1fr;justify-items:center;text-align:center;}}
.plot-wrap{position:relative;width:100%;max-width:240px;aspect-ratio:1/1;}
.plot-wrap svg{width:100%;height:100%;}
.hero-stats{display:flex;flex-direction:column;gap:10px;}
.hero-stats h1{font-family:'Chakra Petch',sans-serif;font-size:19px;margin:0 0 2px;letter-spacing:0.3px;}
.hero-stats p{margin:0;color:var(--ink-dim);font-size:13px;line-height:1.5;max-width:440px;}
.stat-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;}
.stat-chip{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 12px;min-width:84px;}
.stat-chip .v{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--level-accent);}
.stat-chip .l{font-size:9px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

.tabs{display:flex;gap:6px;overflow-x:auto;padding:16px 18px 4px;max-width:1080px;margin:0 auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{flex:none;border:1px solid var(--line);background:var(--panel);color:var(--ink-dim);
  font-family:'Chakra Petch',sans-serif;font-size:12.5px;font-weight:600;letter-spacing:0.3px;
  padding:9px 15px;border-radius:9px;cursor:pointer;white-space:nowrap;transition:all .15s;}
.tab-btn.active{background:var(--level-accent-dim);border-color:var(--level-accent);color:var(--level-accent);}

main{max-width:1080px;margin:0 auto;padding:14px 18px 30px;}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;}
.section-head{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.section-head h2{font-family:'Chakra Petch',sans-serif;font-size:16px;margin:0;}
.section-head .count{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--ink-faint);text-align:right;}

.cat-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.cat-pill{border:1px solid var(--line);background:var(--panel2);color:var(--ink-dim);font-size:11.5px;
  padding:6px 11px;border-radius:14px;cursor:pointer;white-space:nowrap;}
.cat-pill.active{border-color:var(--level-accent);color:var(--level-accent);background:var(--level-accent-dim);}

.txt-pt{font-size:14.5px;font-weight:600;line-height:1.45;}
.txt-en{font-size:13.5px;font-style:italic;color:var(--ink-dim);line-height:1.45;margin-top:4px;
  display:flex;align-items:flex-start;gap:7px;}
.txt-en span{flex:1;}
.txt-phon{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--level-accent);
  margin-top:3px;line-height:1.5;opacity:0.9;}
.audio-btn{flex:none;border:1px solid var(--line);background:var(--panel2);color:var(--level-accent);
  border-radius:7px;width:26px;height:26px;font-size:12px;cursor:pointer;line-height:1;padding:0;}
.audio-btn:active{transform:scale(0.92);}

.qa-card{border:1px solid var(--line);background:var(--panel2);border-radius:12px;padding:16px;margin-bottom:10px;}
.qa-card .tag{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--level-accent);letter-spacing:1px;text-transform:uppercase;}
.qa-card .q-block{margin:8px 0 12px;}
.qa-nav{display:flex;justify-content:space-between;align-items:center;margin-top:14px;}
.qa-nav button{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:8px;
  padding:9px 16px;font-size:13px;cursor:pointer;font-family:'Chakra Petch',sans-serif;font-weight:600;}
.qa-nav button:disabled{opacity:0.35;cursor:default;}
.qa-progress{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-faint);}

.quiz-progress-bar{height:5px;background:var(--panel2);border-radius:3px;overflow:hidden;margin-bottom:16px;}
.quiz-progress-bar div{height:100%;background:var(--level-accent);transition:width .3s;}
.quiz-q{margin-bottom:16px;}
.quiz-opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--panel2);color:var(--ink);
  padding:12px 14px;border-radius:10px;margin-bottom:8px;font-size:13.5px;cursor:pointer;font-family:'Inter',sans-serif;
  line-height:1.4;transition:all .15s;outline:none;}
.quiz-opt:hover{border-color:var(--ink-faint);}
.quiz-opt:focus-visible{box-shadow:0 0 0 2px var(--level-accent);}
.quiz-opt.correct{border-color:var(--cyan);background:var(--cyan-dim);color:var(--cyan);}
.quiz-opt.wrong{border-color:var(--red);background:#3A1D1B;color:#F0958C;}
.quiz-opt.disabled{cursor:default;}
.quiz-opt.disabled:not(.correct):not(.wrong){opacity:0.5;}
.quiz-opt .txt-en{color:inherit;opacity:0.8;}
.quiz-footer{display:flex;justify-content:space-between;align-items:center;margin-top:14px;}
.quiz-score{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--ink-dim);}
.btn-primary{background:var(--level-accent);color:#08131c;border:none;font-family:'Chakra Petch',sans-serif;font-weight:700;
  padding:10px 18px;border-radius:9px;cursor:pointer;font-size:13px;letter-spacing:0.3px;}
.btn-primary:disabled{opacity:0.35;cursor:default;}
.quiz-result{text-align:center;padding:24px 10px;}
.quiz-result .big{font-family:'Chakra Petch',sans-serif;font-size:40px;font-weight:700;color:var(--level-accent);}
.quiz-result p{color:var(--ink-dim);font-size:13.5px;margin-top:6px;}

.prob-card{border:1px solid var(--line);background:var(--panel2);border-radius:12px;padding:16px;margin-bottom:10px;}
.prob-card .lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--amber);letter-spacing:1px;text-transform:uppercase;}
.prob-card .p-block{margin:8px 0 12px;}

.gloss-item{display:flex;align-items:flex-start;gap:12px;border:1px solid var(--line);background:var(--panel2);
  border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.gloss-audio{flex:none;border:1px solid var(--line);background:var(--panel);color:var(--level-accent);
  border-radius:8px;width:34px;height:34px;font-size:15px;cursor:pointer;}
.gloss-audio:active{transform:scale(0.92);}
.gloss-text{flex:1;}
.gloss-en{font-family:'Chakra Petch',sans-serif;font-size:14px;font-weight:600;}
.gloss-phon{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--level-accent);margin-top:2px;}
.gloss-pt{font-size:12.5px;color:var(--ink-dim);margin-top:3px;}
.gloss-search{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  padding:10px 12px;border-radius:9px;font-size:13px;margin-bottom:12px;font-family:'Inter',sans-serif;}
.gloss-note{font-size:11px;color:var(--ink-faint);line-height:1.6;margin-bottom:14px;}

.foot-note{text-align:center;color:var(--ink-faint);font-size:11px;margin-top:28px;line-height:1.6;padding:0 20px;}

.sim-grid{display:grid;grid-template-columns:1fr 300px;gap:18px;}
@media (max-width:800px){.sim-grid{grid-template-columns:1fr;}}
.sim-plot{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:14px;display:flex;flex-direction:column;align-items:center;}
.sim-plot svg{width:100%;max-width:400px;}
.sim-readout{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:400px;margin-top:10px;}
.ro{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 10px;}
.ro .l{font-size:9px;color:var(--ink-faint);letter-spacing:1px;text-transform:uppercase;}
.ro .v{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;margin-top:2px;}
.ro .v.ok{color:var(--cyan);} .ro .v.warn{color:var(--amber);} .ro .v.bad{color:var(--red);}
.sim-controls{display:flex;flex-direction:column;gap:14px;}
.ctrl-group{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;}
.ctrl-group .gl{font-family:'Chakra Petch',sans-serif;font-size:12px;font-weight:600;color:var(--ink-dim);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:10px;}
.slider-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;font-size:12px;color:var(--ink-dim);}
.slider-row .val{font-family:'JetBrains Mono',monospace;color:var(--ink);}
input[type=range]{width:100%;accent-color:var(--level-accent);margin:4px 0 12px;}
select{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:8px 10px;
  border-radius:8px;font-size:12.5px;font-family:'Inter',sans-serif;margin-top:2px;}
.sim-btns{display:flex;gap:8px;}
.sim-btns button{flex:1;}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink-dim);font-family:'Chakra Petch',sans-serif;
  font-weight:600;padding:10px 14px;border-radius:9px;cursor:pointer;font-size:12.5px;}
.sim-note{font-size:10.5px;color:var(--ink-faint);line-height:1.5;margin-top:4px;}

.thr-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;}
.thr-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;}
.thr-card.failed{border-color:var(--red);background:#2a1414;}
.thr-name{font-family:'Chakra Petch',sans-serif;font-size:12px;font-weight:600;margin-bottom:8px;}
.thr-bar{height:9px;background:var(--panel2);border-radius:5px;overflow:hidden;}
.thr-bar-fill{height:100%;border-radius:5px;transition:width .3s;}
.thr-meta{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-dim);margin-top:8px;}
.thr-card.failed .thr-meta{color:#F0958C;}

.alarm-list{display:flex;flex-direction:column;gap:6px;width:100%;max-height:380px;overflow-y:auto;}
.alarm-item{display:flex;gap:10px;align-items:baseline;padding:9px 12px;border-radius:8px;background:var(--panel);
  border:1px solid var(--line);font-size:12px;line-height:1.4;}
.alarm-item.warn{border-color:var(--amber);color:#F5CE9B;}
.alarm-item.bad{border-color:var(--red);color:#F0958C;}
.alarm-item.ok{border-color:var(--cyan);color:#9FEBE0;}
.alarm-time{font-family:'JetBrains Mono',monospace;color:var(--ink-faint);flex:none;font-size:11px;}
.alarm-empty{color:var(--ink-faint);font-size:12.5px;text-align:center;padding:24px 10px;}
</style>
</head>
<body data-level="basico">

<div class="topbar">
  <div class="brand">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="18" stroke="#35D6C0" stroke-width="1.4" opacity="0.5"/>
      <circle cx="20" cy="20" r="12" stroke="#35D6C0" stroke-width="1.2" opacity="0.7"/>
      <path d="M20 8 L26 30 L20 26 L14 30 Z" fill="#35D6C0"/>
      <circle cx="20" cy="20" r="1.6" fill="#E7EEF6"/>
    </svg>
    <div class="brand-text">
      <div class="t1">DP OFFSHORE TRAINER</div>
      <div class="t2" id="brand-tagline">Posicionamento Dinâmico</div>
    </div>
  </div>
  <div class="level-switch">
    <button id="btn-lvl-basico" class="active" onclick="setLevel('basico')">Básico</button>
    <button id="btn-lvl-avancado" onclick="setLevel('avancado')">Avançado</button>
  </div>
</div>

<div class="settings-bar">
  <div class="settings-group">
    <span class="settings-label" id="lbl-lang">Idioma do conteúdo</span>
    <div class="seg-control" id="lang-switch">
      <button data-val="pt" class="active">PT</button>
      <button data-val="en">EN</button>
      <button data-val="pt_en">PT+EN</button>
    </div>
  </div>
  <div class="settings-group">
    <label class="switch">
      <input type="checkbox" id="pron-toggle">
      <span class="slider-toggle"></span>
    </label>
    <span class="settings-label" id="lbl-pron">Guia de pronúncia + áudio 🔊</span>
  </div>
</div>

<section class="hero">
  <div class="plot-wrap">
    <svg id="hero-plot" viewBox="0 0 240 240"></svg>
  </div>
  <div class="hero-stats">
    <h1 id="hero-title">Nível Básico</h1>
    <p id="hero-sub"></p>
    <div class="stat-row">
      <div class="stat-chip"><div class="v" id="stat-total">100</div><div class="l" id="lbl-stat-total">Perguntas</div></div>
      <div class="stat-chip"><div class="v" id="stat-seen">0</div><div class="l" id="lbl-stat-seen">Revisadas</div></div>
      <div class="stat-chip"><div class="v" id="stat-correct">0/0</div><div class="l" id="lbl-stat-correct">Acertos</div></div>
      <div class="stat-chip"><div class="v" id="stat-quiz">—</div><div class="l" id="lbl-stat-quiz">Último quiz</div></div>
    </div>
  </div>
</section>

<main id="content"></main>

<script id="data-q" type="application/json">[{"id": 1, "level": "basico", "cat": "Fundamentos de DP", "tipo": "qa", "q_pt": "O que é Posicionamento Dinâmico (DP)?", "a_pt": "Sistema que usa propulsores próprios controlados por computador para manter automaticamente a posição e o rumo da embarcação, sem uso de âncoras.", "q_en": "What is Dynamic Positioning (DP)?", "a_en": "A system that uses the vessel's own computer-controlled thrusters to automatically maintain position and heading, without the use of anchors.", "opts_pt": null, "opts_en": null}, {"id": 2, "level": "basico", "cat": "Fundamentos de DP", "tipo": "qa", "q_pt": "Quais são os três elementos básicos de um sistema DP?", "a_pt": "Sensores de posição/referência, o computador de controle (sistema DP) e os propulsores (thrusters).", "q_en": "What are the three basic elements of a DP system?", "a_en": "Position/reference sensors, the control computer (DP system), and the propulsion units (thrusters).", "opts_pt": null, "opts_en": null}, {"id": 3, "level": "basico", "cat": "Fundamentos de DP", "tipo": "qa", "q_pt": "Qual é a função do computador DP?", "a_pt": "Comparar a posição e o rumo desejados com os valores medidos e calcular os comandos de empuxo para cada propulsor.", "q_en": "What is the function of the DP computer?", "a_en": "To compare the desired position and heading with the measured values and calculate the thrust commands for each thruster.", "opts_pt": null, "opts_en": null}, {"id": 4, "level": "basico", "cat": "Fundamentos de DP", "tipo": "qa", "q_pt": "O que significa \"setpoint\" em DP?", "a_pt": "A posição e o rumo desejados que o sistema deve manter.", "q_en": "What does \"setpoint\" mean in DP?", "a_en": "The desired position and heading that the system must maintain.", "opts_pt": null, "opts_en": null}, {"id": 5, "level": "basico", "cat": "Fundamentos de DP", "tipo": "qa", "q_pt": "Por que embarcações offshore usam DP em vez de ancoragem?", "a_pt": "Porque operam em águas profundas, próximas a estruturas submarinas, ou precisam de posicionamento preciso e rápida capacidade de manobra.", "q_en": "Why do offshore vessels use DP instead of anchoring?", "a_en": "Because they operate in deep water, close to subsea structures, or need precise positioning and fast maneuvering capability.", "opts_pt": null, "opts_en": null}, {"id": 6, "level": "basico", "cat": "Fundamentos de DP", "tipo": "qa", "q_pt": "O que é \"excursão de posição\" (position excursion)?", "a_pt": "O desvio da embarcação em relação ao setpoint, geralmente monitorado em metros.", "q_en": "What is \"position excursion\"?", "a_en": "The vessel's deviation from the setpoint, usually monitored in meters.", "opts_pt": null, "opts_en": null}, {"id": 7, "level": "basico", "cat": "Fundamentos de DP", "tipo": "qa", "q_pt": "O que é o \"footprint\" de uma embarcação em DP?", "a_pt": "A área de variação de posição observada ao redor do setpoint durante a operação.", "q_en": "What is a vessel's \"footprint\" in DP?", "a_en": "The area of position variation observed around the setpoint during the operation.", "opts_pt": null, "opts_en": null}, {"id": 8, "level": "basico", "cat": "Fundamentos de DP", "tipo": "qa", "q_pt": "Cite três forças ambientais que o DP precisa compensar.", "a_pt": "Vento, corrente marítima e ondas (incluindo a deriva de onda de 2ª ordem).", "q_en": "Name three environmental forces that DP must compensate for.", "a_en": "Wind, current, and waves (including second-order wave drift).", "opts_pt": null, "opts_en": null}, {"id": 9, "level": "basico", "cat": "Fundamentos de DP", "tipo": "qa", "q_pt": "O que indica um status \"verde\" no sistema DP?", "a_pt": "Que todos os sistemas críticos (energia, sensores, propulsores) estão operacionais e com redundância disponível.", "q_en": "What does a \"green\" status indicate in the DP system?", "a_en": "That all critical systems (power, sensors, thrusters) are operational and redundancy is available.", "opts_pt": null, "opts_en": null}, {"id": 10, "level": "basico", "cat": "Fundamentos de DP", "tipo": "qa", "q_pt": "Qual a diferença entre DP e piloto automático convencional?", "a_pt": "O DP controla posição e rumo simultaneamente usando múltiplos propulsores; o piloto automático controla apenas o rumo durante o deslocamento.", "q_en": "What is the difference between DP and a conventional autopilot?", "a_en": "DP controls position and heading simultaneously using multiple thrusters; an autopilot only controls heading while underway.", "opts_pt": null, "opts_en": null}, {"id": 11, "level": "basico", "cat": "Classes DP (IMO)", "tipo": "qa", "q_pt": "Quantas classes de equipamento DP a IMO define?", "a_pt": "Três: DP Classe 1, 2 e 3, conforme a diretriz MSC/Circ.645.", "q_en": "How many DP equipment classes does the IMO define?", "a_en": "Three: DP Equipment Class 1, 2 and 3, per IMO guideline MSC/Circ.645.", "opts_pt": null, "opts_en": null}, {"id": 12, "level": "basico", "cat": "Classes DP (IMO)", "tipo": "qa", "q_pt": "O que caracteriza DP Classe 1?", "a_pt": "Perda de posição pode ocorrer com uma única falha; não há requisito de redundância.", "q_en": "What characterizes DP Class 1?", "a_en": "Loss of position can occur with a single fault; there is no redundancy requirement.", "opts_pt": null, "opts_en": null}, {"id": 13, "level": "basico", "cat": "Classes DP (IMO)", "tipo": "qa", "q_pt": "O que caracteriza DP Classe 2?", "a_pt": "Perda de posição não deve ocorrer com uma única falha em qualquer componente ativo, exceto compartimentos estanques.", "q_en": "What characterizes DP Class 2?", "a_en": "Loss of position must not occur with a single fault in any active component, except watertight compartments.", "opts_pt": null, "opts_en": null}, {"id": 14, "level": "basico", "cat": "Classes DP (IMO)", "tipo": "qa", "q_pt": "O que caracteriza DP Classe 3?", "a_pt": "Redundância adicional com proteção contra fogo e alagamento, exigindo separação física entre sistemas redundantes.", "q_en": "What characterizes DP Class 3?", "a_en": "Additional redundancy includes protection against fire and flooding, requiring physical separation between redundant systems.", "opts_pt": null, "opts_en": null}, {"id": 15, "level": "basico", "cat": "Classes DP (IMO)", "tipo": "qa", "q_pt": "Que tipo de operação normalmente exige DP Classe 3?", "a_pt": "Operações críticas, como perfuração em águas profundas, onde a perda de posição pode causar acidente grave.", "q_en": "What type of operation typically requires DP Class 3?", "a_en": "Critical operations, such as deepwater drilling, where loss of position could cause a serious accident.", "opts_pt": null, "opts_en": null}, {"id": 16, "level": "basico", "cat": "Classes DP (IMO)", "tipo": "qa", "q_pt": "O que significa a notação DNV \"DYNPOS-AUTR\"?", "a_pt": "Equivalente a DP2: sistema autônomo com redundância, sem perda de posição numa única falha.", "q_en": "What does the DNV notation \"DYNPOS-AUTR\" mean?", "a_en": "Equivalent to DP2: an autonomous system with redundancy, with no loss of position on a single failure.", "opts_pt": null, "opts_en": null}, {"id": 17, "level": "basico", "cat": "Classes DP (IMO)", "tipo": "qa", "q_pt": "O que significa \"AUTRO\" na notação DNV?", "a_pt": "Equivalente a DP3: redundância com separação física entre sistemas.", "q_en": "What does \"AUTRO\" mean in the DNV notation?", "a_en": "Equivalent to DP3: redundancy with physical separation between systems.", "opts_pt": null, "opts_en": null}, {"id": 18, "level": "basico", "cat": "Classes DP (IMO)", "tipo": "qa", "q_pt": "Um rebocador de apoio offshore comum normalmente opera em qual classe DP?", "a_pt": "Frequentemente DP1 ou DP2, dependendo da operação e dos requisitos contratuais.", "q_en": "What DP class does a typical offshore support tug usually operate in?", "a_en": "Often DP1 or DP2, depending on the operation and contractual requirements.", "opts_pt": null, "opts_en": null}, {"id": 19, "level": "basico", "cat": "Classes DP (IMO)", "tipo": "qa", "q_pt": "Quem define os requisitos de classe DP de uma embarcação?", "a_pt": "As sociedades classificadoras (DNV, ABS, Lloyd's Register, entre outras), com base nas diretrizes da IMO.", "q_en": "Who defines a vessel's DP class requirements?", "a_en": "Classification societies (DNV, ABS, Lloyd's Register, etc.), based on IMO guidelines.", "opts_pt": null, "opts_en": null}, {"id": 20, "level": "basico", "cat": "Classes DP (IMO)", "tipo": "qa", "q_pt": "O que é uma ASOG (Activity Specific Operating Guideline)?", "a_pt": "Documento que define os limites operacionais e o nível mínimo de equipamento redundante exigido para cada tarefa DP específica.", "q_en": "What is an ASOG (Activity Specific Operating Guideline)?", "a_en": "A document defining the operating limits and the minimum level of redundant equipment required for each specific DP task.", "opts_pt": null, "opts_en": null}, {"id": 21, "level": "basico", "cat": "Propulsores (Thrusters)", "tipo": "qa", "q_pt": "O que é um \"tunnel thruster\"?", "a_pt": "Propulsor instalado num túnel transversal ao casco, que gera empuxo lateral.", "q_en": "What is a \"tunnel thruster\"?", "a_en": "A thruster installed in a tunnel running across the hull, generating lateral thrust.", "opts_pt": null, "opts_en": null}, {"id": 22, "level": "basico", "cat": "Propulsores (Thrusters)", "tipo": "qa", "q_pt": "O que é um propulsor azimutal (azimuth thruster)?", "a_pt": "Propulsor que pode girar 360°, gerando empuxo em qualquer direção.", "q_en": "What is an azimuth thruster?", "a_en": "A thruster that can rotate 360°, generating thrust in any direction.", "opts_pt": null, "opts_en": null}, {"id": 23, "level": "basico", "cat": "Propulsores (Thrusters)", "tipo": "qa", "q_pt": "O que é um propulsor retrátil?", "a_pt": "Propulsor azimutal que pode ser recolhido para dentro do casco quando não está em uso, reduzindo o arrasto.", "q_en": "What is a retractable thruster?", "a_en": "An azimuth thruster that can be retracted into the hull when not in use, reducing drag.", "opts_pt": null, "opts_en": null}, {"id": 24, "level": "basico", "cat": "Propulsores (Thrusters)", "tipo": "qa", "q_pt": "Qual a vantagem de propulsores azimutais sobre propulsores fixos?", "a_pt": "Permitem empuxo em qualquer direção sem girar a embarcação, aumentando a eficiência no DP.", "q_en": "What is the advantage of azimuth thrusters over fixed thrusters?", "a_en": "They allow thrust in any direction without turning the vessel, increasing DP efficiency.", "opts_pt": null, "opts_en": null}, {"id": 25, "level": "basico", "cat": "Propulsores (Thrusters)", "tipo": "qa", "q_pt": "O que é um propulsor tipo \"Z-drive\"?", "a_pt": "Propulsor azimutal com transmissão em ângulo que direciona a potência do motor até a hélice submersa.", "q_en": "What is a \"Z-drive\" thruster?", "a_en": "An azimuth thruster with an angled transmission that directs engine power down to the submerged propeller.", "opts_pt": null, "opts_en": null}, {"id": 26, "level": "basico", "cat": "Propulsores (Thrusters)", "tipo": "qa", "q_pt": "O que são hélices contrarrotativas (CRP) em thrusters?", "a_pt": "Duas hélices no mesmo eixo girando em sentidos opostos, para melhorar a eficiência hidrodinâmica.", "q_en": "What are contra-rotating propellers (CRP) in thrusters?", "a_en": "Two propellers on the same shaft spinning in opposite directions to improve hydrodynamic efficiency.", "opts_pt": null, "opts_en": null}, {"id": 27, "level": "basico", "cat": "Propulsores (Thrusters)", "tipo": "qa", "q_pt": "O que é interação entre propulsores (thruster-thruster interaction)?", "a_pt": "Quando o fluxo de um propulsor interfere na eficiência de outro próximo, exigindo compensação no cálculo de alocação.", "q_en": "What is thruster-thruster interaction?", "a_en": "When the flow from one thruster interferes with the efficiency of another nearby, requiring compensation in the allocation calculation.", "opts_pt": null, "opts_en": null}, {"id": 28, "level": "basico", "cat": "Propulsores (Thrusters)", "tipo": "qa", "q_pt": "Por que thrusters de proa e popa costumam ser combinados no DP?", "a_pt": "Para permitir controle independente de força lateral e momento de guinada em qualquer posição do navio.", "q_en": "Why are bow and stern thrusters usually combined in DP?", "a_en": "To allow independent control of lateral force and yaw moment at any position of the ship.", "opts_pt": null, "opts_en": null}, {"id": 29, "level": "basico", "cat": "Propulsores (Thrusters)", "tipo": "qa", "q_pt": "O que é uma \"zona proibida\" (forbidden zone) na alocação de propulsores?", "a_pt": "Um setor angular no qual o propulsor não pode operar, geralmente para evitar colisão de jatos ou interferência com o casco.", "q_en": "What is a \"forbidden zone\" in thruster allocation?", "a_en": "An angular sector in which the thruster cannot operate, usually to avoid jet collision or interference with the hull.", "opts_pt": null, "opts_en": null}, {"id": 30, "level": "basico", "cat": "Propulsores (Thrusters)", "tipo": "qa", "q_pt": "O que acontece com a capacidade de posicionamento se um thruster principal falha?", "a_pt": "A redundância dos demais propulsores deve compensar a perda; caso contrário a embarcação pode perder posição.", "q_en": "What happens to positioning capability if a main thruster fails?", "a_en": "The redundancy of the remaining thrusters must compensate for the loss; otherwise the vessel may lose position.", "opts_pt": null, "opts_en": null}, {"id": 31, "level": "basico", "cat": "Sistemas de Referência de Posição", "tipo": "qa", "q_pt": "O que é DGPS e para que serve no DP?", "a_pt": "GPS diferencial: fornece a posição absoluta da embarcação com correção de erro em tempo real.", "q_en": "What is DGPS and what is it used for in DP?", "a_en": "Differential GPS: it provides the vessel's absolute position with real-time error correction.", "opts_pt": null, "opts_en": null}, {"id": 32, "level": "basico", "cat": "Sistemas de Referência de Posição", "tipo": "qa", "q_pt": "O que é HPR (Hydroacoustic Position Reference)?", "a_pt": "Sistema de referência de posição acústico subaquático, que mede a posição relativa a um transponder no fundo do mar.", "q_en": "What is HPR (Hydroacoustic Position Reference)?", "a_en": "An underwater acoustic position reference system that measures position relative to a transponder on the seabed.", "opts_pt": null, "opts_en": null}, {"id": 33, "level": "basico", "cat": "Sistemas de Referência de Posição", "tipo": "qa", "q_pt": "O que é um sistema de referência a laser (ex: Fanbeam/CyScan)?", "a_pt": "Sistema óptico que mede distância e ângulo até um refletor prisma fixado numa estrutura, usado para posicionamento relativo.", "q_en": "What is a laser position reference system (e.g. Fanbeam/CyScan)?", "a_en": "An optical system that measures distance and angle to a prism reflector fixed on a structure, used for relative positioning.", "opts_pt": null, "opts_en": null}, {"id": 34, "level": "basico", "cat": "Sistemas de Referência de Posição", "tipo": "qa", "q_pt": "O que é \"Taut Wire\"?", "a_pt": "Sistema de referência por cabo tensionado com peso no fundo do mar, medindo ângulo e comprimento do cabo.", "q_en": "What is a \"Taut Wire\" system?", "a_en": "A position reference system using a tensioned wire with a weight on the seabed, measuring angle and wire length.", "opts_pt": null, "opts_en": null}, {"id": 35, "level": "basico", "cat": "Sistemas de Referência de Posição", "tipo": "qa", "q_pt": "Por que o DP normalmente usa mais de um sistema de referência de posição?", "a_pt": "Para redundância e votação entre sensores, descartando leituras degradadas ou defeituosas.", "q_en": "Why does DP normally use more than one position reference system?", "a_en": "For redundancy and voting between sensors, discarding degraded or faulty readings.", "opts_pt": null, "opts_en": null}, {"id": 36, "level": "basico", "cat": "Sistemas de Referência de Posição", "tipo": "qa", "q_pt": "O que é o sistema Artemis?", "a_pt": "Sistema de referência de posição por micro-ondas usado em operações relativas a estruturas fixas, como plataformas.", "q_en": "What is the Artemis system?", "a_en": "A microwave position reference system used for operations relative to fixed structures, such as platforms.", "opts_pt": null, "opts_en": null}, {"id": 37, "level": "basico", "cat": "Sistemas de Referência de Posição", "tipo": "qa", "q_pt": "Qual a diferença entre posição \"relativa\" e \"absoluta\" em DP?", "a_pt": "Absoluta usa coordenadas geográficas globais (ex: DGPS); relativa refere-se à posição em relação a um objeto específico.", "q_en": "What is the difference between \"relative\" and \"absolute\" position in DP?", "a_en": "Absolute uses global geographic coordinates (e.g. DGPS); relative refers to position with respect to a specific object.", "opts_pt": null, "opts_en": null}, {"id": 38, "level": "basico", "cat": "Sistemas de Referência de Posição", "tipo": "qa", "q_pt": "O que pode causar degradação de sinal DGPS?", "a_pt": "Multipercurso (multipath), obstrução por estruturas, interferência ou perda da correção diferencial.", "q_en": "What can cause DGPS signal degradation?", "a_en": "Multipath, obstruction by structures, interference, or loss of the differential correction.", "opts_pt": null, "opts_en": null}, {"id": 39, "level": "basico", "cat": "Sistemas de Referência de Posição", "tipo": "qa", "q_pt": "Por que sistemas acústicos podem falhar em águas rasas ou ruidosas?", "a_pt": "Interferência acústica de outras embarcações, bolhas de ar sob o casco ou reflexões no fundo/estruturas.", "q_en": "Why can acoustic systems fail in shallow or noisy waters?", "a_en": "Acoustic interference from other vessels, air bubbles under the hull, or reflections off the seabed and structures.", "opts_pt": null, "opts_en": null}, {"id": 40, "level": "basico", "cat": "Sistemas de Referência de Posição", "tipo": "qa", "q_pt": "O que é RTK (Real Time Kinematic) aplicado ao DP?", "a_pt": "Técnica de GPS de alta precisão que usa correções de uma estação de referência para reduzir o erro a poucos centímetros.", "q_en": "What is RTK (Real Time Kinematic) as applied to DP?", "a_en": "A high-precision GPS technique that uses corrections from a reference station to reduce error to a few centimeters.", "opts_pt": null, "opts_en": null}, {"id": 41, "level": "basico", "cat": "Sensores Ambientais e de Movimento", "tipo": "qa", "q_pt": "O que é um giroscópio (gyrocompass) e sua função no DP?", "a_pt": "Sensor que fornece o rumo da embarcação de forma independente do campo magnético.", "q_en": "What is a gyrocompass and its function in DP?", "a_en": "A sensor that provides the vessel's heading independently of the magnetic field.", "opts_pt": null, "opts_en": null}, {"id": 42, "level": "basico", "cat": "Sensores Ambientais e de Movimento", "tipo": "qa", "q_pt": "O que é um MRU (Motion Reference Unit)?", "a_pt": "Sensor que mede os movimentos de roll, pitch e heave da embarcação, usado para compensar os sensores de posição.", "q_en": "What is an MRU (Motion Reference Unit)?", "a_en": "A sensor that measures the vessel's roll, pitch and heave, used to compensate the position sensors.", "opts_pt": null, "opts_en": null}, {"id": 43, "level": "basico", "cat": "Sensores Ambientais e de Movimento", "tipo": "qa", "q_pt": "Qual a função do sensor de vento no sistema DP?", "a_pt": "Medir velocidade e direção do vento para antecipar (feedforward) o cálculo de empuxo necessário.", "q_en": "What is the function of the wind sensor in the DP system?", "a_en": "To measure wind speed and direction to anticipate (feedforward) the required thrust calculation.", "opts_pt": null, "opts_en": null}, {"id": 44, "level": "basico", "cat": "Sensores Ambientais e de Movimento", "tipo": "qa", "q_pt": "O que é \"feedforward\" de vento em DP?", "a_pt": "Técnica em que a força de vento medida é usada para antecipar o comando de empuxo, sem esperar o efeito no erro de posição.", "q_en": "What is wind \"feedforward\" in DP?", "a_en": "A technique where the measured wind force is used to anticipate the thrust command, instead of waiting for the effect on the position error.", "opts_pt": null, "opts_en": null}, {"id": 45, "level": "basico", "cat": "Sensores Ambientais e de Movimento", "tipo": "qa", "q_pt": "Por que o sistema DP precisa estimar a corrente marítima?", "a_pt": "Porque a corrente gera uma força contínua sobre o casco, que precisa ser compensada pelo empuxo.", "q_en": "Why does the DP system need to estimate sea current?", "a_en": "Because current generates a continuous force on the hull that needs to be compensated by thrust.", "opts_pt": null, "opts_en": null}, {"id": 46, "level": "basico", "cat": "Sensores Ambientais e de Movimento", "tipo": "qa", "q_pt": "Como o DP geralmente estima a corrente marítima?", "a_pt": "Indiretamente, comparando o empuxo comandado com o movimento observado, através do modelo matemático do navio.", "q_en": "How does DP usually estimate sea current?", "a_en": "Indirectly, by comparing the commanded thrust with the observed motion, through the vessel's mathematical model.", "opts_pt": null, "opts_en": null}, {"id": 47, "level": "basico", "cat": "Sensores Ambientais e de Movimento", "tipo": "qa", "q_pt": "O que é um VRS (Vertical Reference Sensor)?", "a_pt": "Outro nome para o sensor que mede os movimentos angulares e verticais (roll, pitch, heave) da embarcação.", "q_en": "What is a VRS (Vertical Reference Sensor)?", "a_en": "Another name for the sensor that measures the vessel's angular and vertical motions (roll, pitch, heave).", "opts_pt": null, "opts_en": null}, {"id": 48, "level": "basico", "cat": "Sensores Ambientais e de Movimento", "tipo": "qa", "q_pt": "Por que a redundância de giroscópios é essencial em DP2/DP3?", "a_pt": "Porque um erro de rumo não detectado pode causar um comando de empuxo incorreto e perda de posição.", "q_en": "Why is gyrocompass redundancy essential in DP2/DP3?", "a_en": "Because an undetected heading error can cause an incorrect thrust command and loss of position.", "opts_pt": null, "opts_en": null}, {"id": 49, "level": "basico", "cat": "Sensores Ambientais e de Movimento", "tipo": "qa", "q_pt": "O que pode causar falha comum a múltiplos sensores de rumo?", "a_pt": "Falha de alimentação elétrica comum, erro de instalação ou interferência eletromagnética compartilhada.", "q_en": "What can cause a common failure across multiple heading sensors?", "a_en": "A shared power failure, an installation error, or shared electromagnetic interference.", "opts_pt": null, "opts_en": null}, {"id": 50, "level": "basico", "cat": "Sensores Ambientais e de Movimento", "tipo": "qa", "q_pt": "O que faz um filtro de ondas aplicado a um sensor MRU?", "a_pt": "Remove o efeito do movimento de 1ª ordem das ondas antes de o sinal ser usado no controle de posição.", "q_en": "What does a wave filter applied to an MRU sensor do?", "a_en": "It removes the effect of first-order wave motion before the signal is used in position control.", "opts_pt": null, "opts_en": null}, {"id": 51, "level": "basico", "cat": "Sistema de Energia", "tipo": "qa", "q_pt": "Por que a geração de energia é crítica para o sistema DP?", "a_pt": "Porque todos os propulsores e o sistema de controle dependem de energia elétrica contínua para manter a posição.", "q_en": "Why is power generation critical to the DP system?", "a_en": "Because all thrusters and the control system depend on continuous electrical power to maintain position.", "opts_pt": null, "opts_en": null}, {"id": 52, "level": "basico", "cat": "Sistema de Energia", "tipo": "qa", "q_pt": "O que é um \"blackout\" numa embarcação DP?", "a_pt": "Perda total de energia elétrica, geralmente causando a perda de todos os propulsores e do controle DP.", "q_en": "What is a \"blackout\" on a DP vessel?", "a_en": "A total loss of electrical power, usually causing the loss of all thrusters and DP control.", "opts_pt": null, "opts_en": null}, {"id": 53, "level": "basico", "cat": "Sistema de Energia", "tipo": "qa", "q_pt": "O que é redundância de barramento (\"split bus\") em sistemas de energia?", "a_pt": "Divisão do sistema elétrico em seções independentes, evitando que uma falha se propague por toda a rede.", "q_en": "What is bus redundancy (\"split bus\") in power systems?", "a_en": "A configuration where the electrical system is divided into independent sections, preventing a fault from spreading through the whole network.", "opts_pt": null, "opts_en": null}, {"id": 54, "level": "basico", "cat": "Sistema de Energia", "tipo": "qa", "q_pt": "Por que geradores redundantes são exigidos em DP2/DP3?", "a_pt": "Para garantir que a perda de um gerador não cause perda total de energia e, consequentemente, de posição.", "q_en": "Why are redundant generators required in DP2/DP3?", "a_en": "To ensure that the loss of one generator does not cause a total loss of power and, consequently, of position.", "opts_pt": null, "opts_en": null}, {"id": 55, "level": "basico", "cat": "Sistema de Energia", "tipo": "qa", "q_pt": "O que é UPS no contexto do sistema DP?", "a_pt": "Fonte de energia ininterrupta que mantém o computador DP e sensores críticos operando durante transições de energia.", "q_en": "What is a UPS in the context of the DP system?", "a_en": "An uninterruptible power supply that keeps the DP computer and critical sensors running during power transitions.", "opts_pt": null, "opts_en": null}, {"id": 56, "level": "basico", "cat": "Sistema de Energia", "tipo": "qa", "q_pt": "O que é \"load sharing\" entre geradores?", "a_pt": "Distribuição balanceada de carga elétrica entre múltiplos geradores operando em paralelo.", "q_en": "What is \"load sharing\" between generators?", "a_en": "The balanced distribution of electrical load between multiple generators operating in parallel.", "opts_pt": null, "opts_en": null}, {"id": 57, "level": "basico", "cat": "Sistema de Energia", "tipo": "qa", "q_pt": "Por que thrusters de grande potência podem causar \"voltage dip\" ao acelerar?", "a_pt": "A alta demanda instantânea de corrente pode reduzir temporariamente a tensão da rede elétrica.", "q_en": "Why can high-power thrusters cause a \"voltage dip\" when accelerating?", "a_en": "The sudden high current demand can temporarily reduce the network's voltage.", "opts_pt": null, "opts_en": null}, {"id": 58, "level": "basico", "cat": "Sistema de Energia", "tipo": "qa", "q_pt": "O que faz um sistema de proteção contra sobrecarga de energia (\"blocker\")?", "a_pt": "Limita ou desconecta cargas para evitar que uma sobrecarga cause blackout total.", "q_en": "What does an overload protection system (\"blocker\") do?", "a_en": "It limits or disconnects loads to prevent an overload from causing a total blackout.", "opts_pt": null, "opts_en": null}, {"id": 59, "level": "basico", "cat": "Sistema de Energia", "tipo": "qa", "q_pt": "Qual o papel do PMS (Power Management System) numa embarcação DP?", "a_pt": "Gerenciar automaticamente a partida, parada e distribuição de carga dos geradores, mantendo energia suficiente e segura.", "q_en": "What is the role of the PMS (Power Management System) on a DP vessel?", "a_en": "To automatically manage the starting, stopping and load distribution of generators, keeping power sufficient and safe.", "opts_pt": null, "opts_en": null}, {"id": 60, "level": "basico", "cat": "Sistema de Energia", "tipo": "qa", "q_pt": "Por que a separação física de geradores é exigida em DP Classe 3?", "a_pt": "Para que um incêndio ou alagamento num compartimento não danifique todos os sistemas de energia redundantes.", "q_en": "Why is physical separation of generators required in DP Class 3?", "a_en": "So that a fire or flooding in one compartment does not damage all redundant power systems.", "opts_pt": null, "opts_en": null}, {"id": 61, "level": "basico", "cat": "O Papel do DPO", "tipo": "qa", "q_pt": "Qual é a principal responsabilidade do DPO?", "a_pt": "Monitorar continuamente o sistema DP, os sensores, o clima e a operação, intervindo quando necessário.", "q_en": "What is the DPO's main responsibility?", "a_en": "To continuously monitor the DP system, sensors, weather and the operation, intervening whenever necessary.", "opts_pt": null, "opts_en": null}, {"id": 62, "level": "basico", "cat": "O Papel do DPO", "tipo": "qa", "q_pt": "O que é o \"DP Watch Log\"?", "a_pt": "Registro periódico das condições dos sistemas DP, sensores, alarmes e status operacional durante a guarda.", "q_en": "What is the \"DP Watch Log\"?", "a_en": "A periodic record of the condition of the DP systems, sensors, alarms and operational status during the watch.", "opts_pt": null, "opts_en": null}, {"id": 63, "level": "basico", "cat": "O Papel do DPO", "tipo": "qa", "q_pt": "Por que o DPO deve conhecer o \"modo de consequência\"?", "a_pt": "Porque esse modo desliga propulsores não essenciais após uma falha para evitar blackout, e o DPO precisa entender o impacto na capacidade de manter posição.", "q_en": "Why must the DPO know the \"consequence mode\"?", "a_en": "Because this mode shuts down non-essential thrusters after a failure to prevent blackout, and the DPO must understand the impact on the ability to keep position.", "opts_pt": null, "opts_en": null}, {"id": 64, "level": "basico", "cat": "O Papel do DPO", "tipo": "qa", "q_pt": "Como a ASOG orienta a prática do DPO?", "a_pt": "Define os limites ambientais e de equipamento aceitáveis para conduzir uma tarefa específica em segurança.", "q_en": "How does the ASOG guide the DPO's practice?", "a_en": "It defines the acceptable environmental and equipment limits for safely carrying out a specific task.", "opts_pt": null, "opts_en": null}, {"id": 65, "level": "basico", "cat": "O Papel do DPO", "tipo": "qa", "q_pt": "Por que o DPO testa propulsores e sensores antes de operações críticas?", "a_pt": "Para confirmar que todos os equipamentos redundantes estão funcionando antes de assumir o risco operacional.", "q_en": "Why does the DPO test thrusters and sensors before critical operations?", "a_en": "To confirm that all redundant equipment is working before taking on operational risk.", "opts_pt": null, "opts_en": null}, {"id": 66, "level": "basico", "cat": "O Papel do DPO", "tipo": "qa", "q_pt": "O que o DPO deve fazer ao perceber degradação de um sistema de referência de posição?", "a_pt": "Verificar a causa, reduzir o peso do sensor degradado no cálculo e informar a ponte/gerência conforme o procedimento.", "q_en": "What should the DPO do upon noticing degradation of a position reference system?", "a_en": "Check the cause, reduce the weight of the degraded sensor in the calculation, and inform the bridge and management as per procedure.", "opts_pt": null, "opts_en": null}, {"id": 67, "level": "basico", "cat": "O Papel do DPO", "tipo": "qa", "q_pt": "O que é tipicamente um \"Yellow Alert\" num sistema DP?", "a_pt": "Um estado de aviso indicando degradação de redundância, exigindo atenção do DPO sem que haja perda de posição.", "q_en": "What is typically a \"Yellow Alert\" in a DP system?", "a_en": "A warning state indicating loss of redundancy, requiring the DPO's attention without an actual loss of position.", "opts_pt": null, "opts_en": null}, {"id": 68, "level": "basico", "cat": "O Papel do DPO", "tipo": "qa", "q_pt": "Por que a comunicação entre o DPO e a estrutura vizinha é essencial?", "a_pt": "Para coordenar procedimentos de emergência e agir rapidamente em caso de perda de posição.", "q_en": "Why is communication between the DPO and the nearby structure essential?", "a_en": "To coordinate emergency procedures and act quickly in the event of loss of position.", "opts_pt": null, "opts_en": null}, {"id": 69, "level": "basico", "cat": "O Papel do DPO", "tipo": "qa", "q_pt": "Como o princípio \"nenhuma falha única deve causar perda de posição\" orienta o DPO?", "a_pt": "O DPO deve garantir que a configuração operacional nunca dependa de um único componente cuja falha isolada cause perda de posição.", "q_en": "How does the principle \"no single failure should cause loss of position\" guide the DPO?", "a_en": "The DPO must ensure that the operational configuration never depends on a single component whose isolated failure would cause loss of position.", "opts_pt": null, "opts_en": null}, {"id": 70, "level": "basico", "cat": "O Papel do DPO", "tipo": "qa", "q_pt": "Qual certificação internacional é exigida para atuar como DPO?", "a_pt": "Certificado do Nautical Institute (DP Basic e Advanced/Unlimited), com registro de horas de experiência supervisionada.", "q_en": "What international certification is required to work as a DPO?", "a_en": "A Nautical Institute certificate (DP Basic and Advanced/Unlimited), with a logbook of supervised experience hours.", "opts_pt": null, "opts_en": null}, {"id": 71, "level": "basico", "cat": "Tipos de Embarcações Offshore", "tipo": "qa", "q_pt": "O que é um AHTS (Anchor Handling Tug Supply)?", "a_pt": "Embarcação que realiza manuseio de âncoras, rebocagem e suprimento a plataformas, frequentemente equipada com DP.", "q_en": "What is an AHTS (Anchor Handling Tug Supply)?", "a_en": "A vessel that performs anchor handling, towing and supply to platforms, often fitted with DP.", "opts_pt": null, "opts_en": null}, {"id": 72, "level": "basico", "cat": "Tipos de Embarcações Offshore", "tipo": "qa", "q_pt": "O que é um PSV (Platform Supply Vessel)?", "a_pt": "Embarcação de suprimento que transporta carga, combustível e água para plataformas, usando DP em manobras próximas.", "q_en": "What is a PSV (Platform Supply Vessel)?", "a_en": "A supply vessel that carries cargo, fuel and water to platforms, using DP for close maneuvering.", "opts_pt": null, "opts_en": null}, {"id": 73, "level": "basico", "cat": "Tipos de Embarcações Offshore", "tipo": "qa", "q_pt": "O que é uma unidade de perfuração semi-submersível?", "a_pt": "Plataforma flutuante com colunas submersas que fornece estabilidade, podendo usar DP ou ancoragem durante a perfuração.", "q_en": "What is a semi-submersible drilling unit?", "a_en": "A floating unit with submerged columns that provides stability, which may use DP or mooring to hold position during drilling.", "opts_pt": null, "opts_en": null}, {"id": 74, "level": "basico", "cat": "Tipos de Embarcações Offshore", "tipo": "qa", "q_pt": "O que é um drillship (navio-sonda)?", "a_pt": "Navio equipado com torre de perfuração e sistema DP, capaz de perfurar em águas ultraprofundas sem ancoragem.", "q_en": "What is a drillship?", "a_en": "A ship fitted with a drilling derrick and a DP system, capable of drilling in ultra-deep water without anchoring.", "opts_pt": null, "opts_en": null}, {"id": 75, "level": "basico", "cat": "Tipos de Embarcações Offshore", "tipo": "qa", "q_pt": "O que é um DSV (Dive Support Vessel)?", "a_pt": "Embarcação de apoio a mergulho, que exige posicionamento extremamente preciso pela presença de mergulhadores/ROVs na água.", "q_en": "What is a DSV (Dive Support Vessel)?", "a_en": "A vessel supporting diving operations, requiring extremely precise positioning due to divers and ROVs in the water.", "opts_pt": null, "opts_en": null}, {"id": 76, "level": "basico", "cat": "Tipos de Embarcações Offshore", "tipo": "qa", "q_pt": "O que é um cable-lay vessel e por que precisa de DP?", "a_pt": "Embarcação especializada em lançamento de cabos submarinos, que precisa manter rumo e velocidade precisos durante o lançamento.", "q_en": "What is a cable-lay vessel and why does it need DP?", "a_en": "A vessel specialized in laying subsea cables, which needs to maintain precise heading and speed during the lay.", "opts_pt": null, "opts_en": null}, {"id": 77, "level": "basico", "cat": "Tipos de Embarcações Offshore", "tipo": "qa", "q_pt": "Por que rebocadores offshore usam DP em operações próximas a plataformas?", "a_pt": "Para manter posição segura e controlada durante conexão/desconexão de cabos de reboque em mar variável.", "q_en": "Why do offshore tugs use DP in operations near platforms?", "a_en": "To maintain a safe, controlled position during connection and disconnection of towing lines in variable sea conditions.", "opts_pt": null, "opts_en": null}, {"id": 78, "level": "basico", "cat": "Tipos de Embarcações Offshore", "tipo": "qa", "q_pt": "O que é um FPSO e como o DP se relaciona a ele?", "a_pt": "Unidade Flutuante de Produção, Armazenamento e Transferência; embarcações de apoio próximas usam DP em operações de offloading.", "q_en": "What is an FPSO and how does DP relate to it?", "a_en": "A Floating Production, Storage and Offloading unit; support vessels nearby use DP for offloading operations.", "opts_pt": null, "opts_en": null}, {"id": 79, "level": "basico", "cat": "Tipos de Embarcações Offshore", "tipo": "qa", "q_pt": "Por que embarcações de instalação de cabos/dutos precisam de alta precisão de posição e rumo?", "a_pt": "Pequenos desvios podem comprometer o traçado do cabo/duto ou danificar infraestrutura submarina.", "q_en": "Why do cable and pipe-laying vessels need high position and heading precision?", "a_en": "Small deviations can compromise the cable or pipeline route or damage subsea infrastructure.", "opts_pt": null, "opts_en": null}, {"id": 80, "level": "basico", "cat": "Tipos de Embarcações Offshore", "tipo": "qa", "q_pt": "O que diferencia um AHTS de um PSV no uso do DP?", "a_pt": "O AHTS realiza manobras de tração e manuseio de âncoras com cargas dinâmicas elevadas; o PSV foca em posicionamento estável para transferência de carga.", "q_en": "What distinguishes an AHTS from a PSV in the use of DP?", "a_en": "An AHTS performs towing and anchor-handling maneuvers with high dynamic loads; a PSV focuses on stable positioning for cargo transfer.", "opts_pt": null, "opts_en": null}, {"id": 81, "level": "basico", "cat": "Problemas e Soluções", "tipo": "problem", "q_pt": "O DP mostra perda de sinal de um dos DGPS enquanto o navio opera próximo a uma plataforma.", "a_pt": "O sistema de votação deve reduzir automaticamente o peso do sensor degradado; o DPO verifica a causa (obstrução, multipath) e monitora os demais sistemas antes de decidir continuar ou abortar a operação.", "q_en": "The DP shows loss of signal from one of the DGPS units while the vessel operates close to a platform.", "a_en": "The voting system should automatically reduce the weight of the degraded sensor; the DPO checks the cause (obstruction, multipath) and monitors the remaining systems before deciding whether to continue or abort.", "opts_pt": null, "opts_en": null}, {"id": 82, "level": "basico", "cat": "Problemas e Soluções", "tipo": "problem", "q_pt": "Um thruster principal apresenta sobrecorrente e desarma automaticamente.", "a_pt": "O sistema redistribui o empuxo entre os propulsores restantes; o DPO avalia se a capacidade residual é suficiente para as condições ambientais, seguindo a ASOG.", "q_en": "A main thruster shows overcurrent and trips automatically.", "a_en": "The system redistributes thrust among the remaining thrusters; the DPO assesses whether the residual capacity is enough for the current environmental conditions, per the ASOG.", "opts_pt": null, "opts_en": null}, {"id": 83, "level": "basico", "cat": "Problemas e Soluções", "tipo": "problem", "q_pt": "O vento aumenta subitamente além do limite operacional da ASOG.", "a_pt": "O DPO avalia a capacidade residual, reduz ou suspende a operação crítica e considera afastar-se da estrutura se a margem de segurança for insuficiente.", "q_en": "Wind suddenly increases beyond the ASOG's operating limit.", "a_en": "The DPO assesses the residual capacity, reduces or suspends the critical operation, and considers moving away from the structure if the safety margin is insufficient.", "opts_pt": null, "opts_en": null}, {"id": 84, "level": "basico", "cat": "Problemas e Soluções", "tipo": "problem", "q_pt": "Ocorre um \"voltage dip\" ao acelerar um thruster de grande potência.", "a_pt": "O PMS deve gerenciar a carga e acionar geradores adicionais previamente; o DPO verifica se há reserva de energia (\"spinning reserve\") conforme o modo de consequência.", "q_en": "A \"voltage dip\" occurs when accelerating a high-power thruster.", "a_en": "The PMS should manage the load and start additional generators beforehand; the DPO checks whether a spinning reserve is configured per the consequence mode.", "opts_pt": null, "opts_en": null}, {"id": 85, "level": "basico", "cat": "Problemas e Soluções", "tipo": "problem", "q_pt": "Dois sistemas de referência de posição divergem significativamente entre si.", "a_pt": "O sistema alerta a divergência (position reference mismatch); o DPO investiga qual sensor está com erro e o remove do cálculo.", "q_en": "Two position reference systems diverge significantly from each other.", "a_en": "The system flags the mismatch (position reference mismatch); the DPO investigates which sensor is at fault and removes it from the calculation.", "opts_pt": null, "opts_en": null}, {"id": 86, "level": "basico", "cat": "Problemas e Soluções", "tipo": "problem", "q_pt": "Um gerador falha e o modo de consequência não está ativado.", "a_pt": "Há risco de blackout parcial por sobrecarga; o DPO deveria ter ativado previamente o modo de consequência para desligar cargas não essenciais.", "q_en": "A generator fails and consequence mode is not activated.", "a_en": "There is a risk of a partial blackout due to overload; the DPO should have activated consequence mode beforehand to shed non-essential loads.", "opts_pt": null, "opts_en": null}, {"id": 87, "level": "basico", "cat": "Problemas e Soluções", "tipo": "problem", "q_pt": "A embarcação apresenta \"drift-off\" (deriva lenta) sem alarme claro.", "a_pt": "O DPO confirma a posição com um sistema de referência independente, verifica falha silenciosa de sensor ou de modelo ambiental, e assume controle manual se necessário.", "q_en": "The vessel shows a \"drift-off\" (slow drift) without a clear alarm.", "a_en": "The DPO confirms the position with an independent reference system, checks for a silent sensor or environmental model fault, and takes manual control if necessary.", "opts_pt": null, "opts_en": null}, {"id": 88, "level": "basico", "cat": "Problemas e Soluções", "tipo": "problem", "q_pt": "A embarcação apresenta \"drive-off\" (movimento acelerado por comando incorreto).", "a_pt": "O DPO deve imediatamente assumir controle manual/joystick ou zerar os propulsores, pois é um evento crítico com risco de colisão.", "q_en": "The vessel shows a \"drive-off\" (fast movement caused by an incorrect command).", "a_en": "The DPO must immediately take manual/joystick control or zero the thrusters, as this is a critical safety event with collision risk.", "opts_pt": null, "opts_en": null}, {"id": 89, "level": "basico", "cat": "Problemas e Soluções", "tipo": "problem", "q_pt": "Ruído acústico de outra embarcação interfere no sistema HPR.", "a_pt": "Coordenar com as embarcações próximas para reduzir ruído, alternar para outro sistema de referência (DGPS/laser) e registrar o evento.", "q_en": "Acoustic noise from another vessel interferes with the HPR system.", "a_en": "Coordinate with nearby vessels to reduce noise, switch to another reference system (DGPS/laser), and log the event.", "opts_pt": null, "opts_en": null}, {"id": 90, "level": "basico", "cat": "Problemas e Soluções", "tipo": "problem", "q_pt": "A ASOG define um limite ambiental próximo de ser atingido durante um mergulho crítico.", "a_pt": "O DPO comunica a supervisão, prepara a suspensão segura da operação e segue o plano de contingência antes de atingir o limite.", "q_en": "The ASOG sets an environmental limit that is close to being reached during a critical diving operation.", "a_en": "The DPO informs supervision, prepares for a safe suspension of the operation, and follows the contingency plan before reaching the limit.", "opts_pt": null, "opts_en": null}, {"id": 91, "level": "basico", "cat": "Puzzle de Terminologia", "tipo": "puzzle", "q_pt": "O que significa a sigla \"DGPS\"?", "a_pt": "Global Positioning System Diferencial", "q_en": "What does the acronym \"DGPS\" stand for?", "a_en": "Differential Global Positioning System", "opts_pt": ["Global Positioning System Diferencial", "Sistema de Referência Acústica", "Unidade de Movimento de Referência", "Guia Operacional de Atividade"], "opts_en": ["Differential Global Positioning System", "Hydroacoustic Position Reference System", "Motion Reference Unit", "Activity Specific Operating Guideline"]}, {"id": 92, "level": "basico", "cat": "Puzzle de Terminologia", "tipo": "puzzle", "q_pt": "O que significa a sigla \"HPR\"?", "a_pt": "Referência de Posição Hidroacústica", "q_en": "What does the acronym \"HPR\" stand for?", "a_en": "Hydroacoustic Position Reference", "opts_pt": ["Referência de Posição Hidroacústica", "Sistema de Gerenciamento de Energia", "Análise de Modos de Falha", "Operador de Posicionamento Dinâmico"], "opts_en": ["Hydroacoustic Position Reference", "Power Management System", "Failure Mode and Effects Analysis", "Dynamic Positioning Operator"]}, {"id": 93, "level": "basico", "cat": "Puzzle de Terminologia", "tipo": "puzzle", "q_pt": "O que significa a sigla \"MRU\"?", "a_pt": "Unidade de Referência de Movimento", "q_en": "What does the acronym \"MRU\" stand for?", "a_en": "Motion Reference Unit", "opts_pt": ["Unidade de Referência de Movimento", "Sistema de Alocação de Empuxo", "Referência de Posição por Laser", "Guia de Operação Específica"], "opts_en": ["Motion Reference Unit", "Thrust Allocation System", "Laser Position Reference", "Activity Specific Operating Guideline"]}, {"id": 94, "level": "basico", "cat": "Puzzle de Terminologia", "tipo": "puzzle", "q_pt": "O que significa a sigla \"DPO\"?", "a_pt": "Operador de Posicionamento Dinâmico", "q_en": "What does the acronym \"DPO\" stand for?", "a_en": "Dynamic Positioning Operator", "opts_pt": ["Operador de Posicionamento Dinâmico", "Sistema de Gerenciamento de Energia", "Unidade de Referência de Movimento", "Análise de Consequência"], "opts_en": ["Dynamic Positioning Operator", "Power Management System", "Motion Reference Unit", "Consequence Analysis"]}, {"id": 95, "level": "basico", "cat": "Puzzle de Terminologia", "tipo": "puzzle", "q_pt": "O que significa a sigla \"ASOG\"?", "a_pt": "Guia Operacional Específico da Atividade", "q_en": "What does the acronym \"ASOG\" stand for?", "a_en": "Activity Specific Operating Guideline", "opts_pt": ["Guia Operacional Específico da Atividade", "Sistema de Referência Hidroacústica", "Unidade de Perfuração Semi-submersível", "Filtro de Kalman"], "opts_en": ["Activity Specific Operating Guideline", "Hydroacoustic Position Reference System", "Semi-Submersible Drilling Unit", "Kalman Filter"]}, {"id": 96, "level": "basico", "cat": "Puzzle de Terminologia", "tipo": "puzzle", "q_pt": "O que significa a sigla \"PMS\"?", "a_pt": "Sistema de Gerenciamento de Energia", "q_en": "What does the acronym \"PMS\" stand for?", "a_en": "Power Management System", "opts_pt": ["Sistema de Gerenciamento de Energia", "Sistema de Referência de Posição", "Unidade de Manuseio de Âncoras", "Modo de Consequência"], "opts_en": ["Power Management System", "Position Reference System", "Anchor Handling Unit", "Consequence Mode"]}, {"id": 97, "level": "basico", "cat": "Puzzle de Terminologia", "tipo": "puzzle", "q_pt": "O que significa a sigla \"FMEA\"?", "a_pt": "Análise de Modos de Falha e Efeitos", "q_en": "What does the acronym \"FMEA\" stand for?", "a_en": "Failure Mode and Effects Analysis", "opts_pt": ["Análise de Modos de Falha e Efeitos", "Guia Operacional Específico da Atividade", "Sistema de Posicionamento Global Diferencial", "Rede de Comunicação Redundante"], "opts_en": ["Failure Mode and Effects Analysis", "Activity Specific Operating Guideline", "Differential Global Positioning System", "Redundant Communication Network"]}, {"id": 98, "level": "basico", "cat": "Puzzle de Terminologia", "tipo": "puzzle", "q_pt": "O que significa a sigla \"WCFDI\"?", "a_pt": "Intenção de Projeto para a Pior Falha", "q_en": "What does the acronym \"WCFDI\" stand for?", "a_en": "Worst Case Failure Design Intent", "opts_pt": ["Intenção de Projeto para a Pior Falha", "Sistema de Referência Óptica", "Unidade de Apoio a Mergulho", "Modo Joystick Independente"], "opts_en": ["Worst Case Failure Design Intent", "Optical Reference System", "Dive Support Unit", "Independent Joystick System"]}, {"id": 99, "level": "basico", "cat": "Puzzle de Terminologia", "tipo": "puzzle", "q_pt": "O que significa a sigla \"AHTS\"?", "a_pt": "Rebocador de Manuseio de Âncoras e Suprimento", "q_en": "What does the acronym \"AHTS\" stand for?", "a_en": "Anchor Handling Tug Supply", "opts_pt": ["Rebocador de Manuseio de Âncoras e Suprimento", "Navio de Perfuração", "Plataforma Semi-submersível", "Unidade de Referência Vertical"], "opts_en": ["Anchor Handling Tug Supply", "Drillship", "Semi-Submersible Platform", "Vertical Reference Unit"]}, {"id": 100, "level": "basico", "cat": "Puzzle de Terminologia", "tipo": "puzzle", "q_pt": "O que significa a sigla \"PSV\"?", "a_pt": "Embarcação de Suprimento a Plataformas", "q_en": "What does the acronym \"PSV\" stand for?", "a_en": "Platform Supply Vessel", "opts_pt": ["Embarcação de Suprimento a Plataformas", "Unidade Flutuante de Produção", "Embarcação de Lançamento de Cabos", "Rebocador de Apoio Offshore"], "opts_en": ["Platform Supply Vessel", "Floating Production Unit", "Cable-Lay Vessel", "Offshore Support Tug"]}, {"id": 101, "level": "avancado", "cat": "Teoria de Controle e Modelagem", "tipo": "qa", "q_pt": "Qual é a função do filtro de Kalman em um sistema DP moderno?", "a_pt": "Estimar o estado real da embarcação (posição, velocidade, rumo), filtrando o ruído de medição e o movimento de onda de 1ª ordem a partir de múltiplos sensores.", "q_en": "What is the function of the Kalman filter in a modern DP system?", "a_en": "To estimate the vessel's true state (position, velocity, heading), filtering measurement noise and first-order wave motion from multiple sensors.", "opts_pt": null, "opts_en": null}, {"id": 102, "level": "avancado", "cat": "Teoria de Controle e Modelagem", "tipo": "qa", "q_pt": "Por que o filtro de Kalman é preferido a filtros passa-baixa simples em DP?", "a_pt": "Porque fornece uma estimativa ótima considerando o modelo dinâmico do navio e as incertezas estatísticas dos sensores, reduzindo atraso e ruído sem perder resposta.", "q_en": "Why is the Kalman filter preferred over simple low-pass filters in DP?", "a_en": "Because it provides an optimal estimate considering the vessel's dynamic model and the statistical uncertainties of the sensors, reducing lag and noise without losing response.", "opts_pt": null, "opts_en": null}, {"id": 103, "level": "avancado", "cat": "Teoria de Controle e Modelagem", "tipo": "qa", "q_pt": "O que é o \"vessel model\" (modelo matemático do navio) usado pelo controlador DP?", "a_pt": "Representação matemática da dinâmica do navio (massa, inércia, coeficientes hidrodinâmicos) usada para prever o comportamento e calcular os comandos de empuxo.", "q_en": "What is the \"vessel model\" used by the DP controller?", "a_en": "A mathematical representation of the vessel's dynamics (mass, inertia, hydrodynamic coefficients) used to predict behavior and calculate thrust commands.", "opts_pt": null, "opts_en": null}, {"id": 104, "level": "avancado", "cat": "Teoria de Controle e Modelagem", "tipo": "qa", "q_pt": "O que é o \"wave filtering\" no controlador DP?", "a_pt": "Processo que separa o movimento de 1ª ordem induzido por ondas, que não deve ser compensado pelos propulsores, do movimento real de baixa frequência.", "q_en": "What is \"wave filtering\" in the DP controller?", "a_en": "The process that separates first-order wave-induced motion, which should not be compensated by the thrusters, from the real low-frequency motion.", "opts_pt": null, "opts_en": null}, {"id": 105, "level": "avancado", "cat": "Teoria de Controle e Modelagem", "tipo": "qa", "q_pt": "Por que compensar o movimento de onda de 1ª ordem com os propulsores seria prejudicial?", "a_pt": "Causaria desgaste excessivo e resposta oscilatória dos propulsores sem benefício real, pois esse movimento é cíclico e não representa deriva real.", "q_en": "Why would compensating first-order wave motion with the thrusters be harmful?", "a_en": "It would cause excessive wear and an oscillatory thruster response with no real benefit, since this motion is cyclical and does not represent real drift.", "opts_pt": null, "opts_en": null}, {"id": 106, "level": "avancado", "cat": "Teoria de Controle e Modelagem", "tipo": "qa", "q_pt": "O que é \"adaptive control\" aplicado a sistemas DP?", "a_pt": "Técnica em que os parâmetros do controlador se ajustam automaticamente conforme as condições ambientais e a resposta observada do navio mudam.", "q_en": "What is \"adaptive control\" applied to DP systems?", "a_en": "A technique in which the controller's parameters automatically adjust as environmental conditions and the observed vessel response change.", "opts_pt": null, "opts_en": null}, {"id": 107, "level": "avancado", "cat": "Teoria de Controle e Modelagem", "tipo": "qa", "q_pt": "O que representa o termo \"bias force\" na estimativa do controlador DP?", "a_pt": "A força ambiental constante estimada (corrente, vento residual, erros de modelo) que o controlador compensa continuamente com empuxo.", "q_en": "What does the term \"bias force\" represent in the DP controller's estimate?", "a_en": "The estimated constant environmental force (current, residual wind, model errors) that the controller continuously compensates for with thrust.", "opts_pt": null, "opts_en": null}, {"id": 108, "level": "avancado", "cat": "Teoria de Controle e Modelagem", "tipo": "qa", "q_pt": "Como o controle PID clássico se relaciona ao controle DP moderno?", "a_pt": "Sistemas DP usam controle PID combinado a filtros de Kalman e modelos preditivos para calcular o empuxo total requerido.", "q_en": "How does classic PID control relate to modern DP control?", "a_en": "DP systems use PID control combined with Kalman filters and predictive models to calculate the total required thrust.", "opts_pt": null, "opts_en": null}, {"id": 109, "level": "avancado", "cat": "Teoria de Controle e Modelagem", "tipo": "qa", "q_pt": "O que é controle preditivo baseado em modelo (MPC) em DP?", "a_pt": "Estratégia que prevê o comportamento futuro do navio para otimizar os comandos de empuxo considerando restrições, usada em sistemas mais avançados.", "q_en": "What is Model Predictive Control (MPC) in DP?", "a_en": "A strategy that predicts the vessel's future behavior to optimize thrust commands considering constraints, used in more advanced DP systems.", "opts_pt": null, "opts_en": null}, {"id": 110, "level": "avancado", "cat": "Teoria de Controle e Modelagem", "tipo": "qa", "q_pt": "Por que a estimativa de rumo é acoplada à estimativa de posição no filtro do DP?", "a_pt": "Porque a dinâmica de guinada afeta diretamente a resposta lateral do navio, exigindo uma estimativa conjunta e consistente.", "q_en": "Why is heading estimation coupled to position estimation in the DP filter?", "a_en": "Because yaw dynamics directly affect the vessel's lateral response, requiring a joint and consistent estimate.", "opts_pt": null, "opts_en": null}, {"id": 111, "level": "avancado", "cat": "FMEA e Provas de Redundância", "tipo": "qa", "q_pt": "O que é uma FMEA em sistemas DP?", "a_pt": "Análise de Modos de Falha e Efeitos: estudo sistemático de como cada componente pode falhar e qual o impacto na capacidade de manter posição.", "q_en": "What is an FMEA in DP systems?", "a_en": "A Failure Mode and Effects Analysis: a systematic study of how each component can fail and its impact on the ability to hold position.", "opts_pt": null, "opts_en": null}, {"id": 112, "level": "avancado", "cat": "FMEA e Provas de Redundância", "tipo": "qa", "q_pt": "Qual é o objetivo de uma \"FMEA Proving Trial\"?", "a_pt": "Verificar na prática, através de testes reais a bordo, que os resultados teóricos da FMEA estão corretos e a redundância funciona como projetado.", "q_en": "What is the objective of an \"FMEA Proving Trial\"?", "a_en": "To verify in practice, through real onboard tests, that the theoretical FMEA results are correct and that redundancy works as designed.", "opts_pt": null, "opts_en": null}, {"id": 113, "level": "avancado", "cat": "FMEA e Provas de Redundância", "tipo": "qa", "q_pt": "O que é um \"single point of failure\" identificado numa FMEA?", "a_pt": "Um componente cuja falha isolada pode causar perda de posição, apesar da redundância projetada.", "q_en": "What is a \"single point of failure\" identified in an FMEA?", "a_en": "A component whose isolated failure can cause loss of position, despite the designed redundancy.", "opts_pt": null, "opts_en": null}, {"id": 114, "level": "avancado", "cat": "FMEA e Provas de Redundância", "tipo": "qa", "q_pt": "Por que a FMEA deve ser revisada após modificações no sistema DP?", "a_pt": "Porque qualquer alteração em equipamentos, cabeamento ou software pode introduzir novos modos de falha ou invalidar redundâncias verificadas.", "q_en": "Why must the FMEA be reviewed after modifications to the DP system?", "a_en": "Because any change to equipment, cabling or software can introduce new failure modes or invalidate previously verified redundancies.", "opts_pt": null, "opts_en": null}, {"id": 115, "level": "avancado", "cat": "FMEA e Provas de Redundância", "tipo": "qa", "q_pt": "O que verifica um teste de \"blackout recovery\" na FMEA Trial?", "a_pt": "Se o sistema restaura energia e recupera a posição dentro de limites aceitáveis após uma perda total de energia.", "q_en": "What does a \"blackout recovery\" test verify in the FMEA Trial?", "a_en": "Whether the system restores power and recovers position within acceptable limits after a total loss of power.", "opts_pt": null, "opts_en": null}, {"id": 116, "level": "avancado", "cat": "FMEA e Provas de Redundância", "tipo": "qa", "q_pt": "O que é a \"criticidade\" de um modo de falha na FMEA?", "a_pt": "A severidade combinada com a probabilidade de ocorrência, usada para priorizar quais falhas exigem mitigação.", "q_en": "What is the \"criticality\" of a failure mode in the FMEA?", "a_en": "The severity combined with the probability of occurrence, used to prioritize which failures require mitigation.", "opts_pt": null, "opts_en": null}, {"id": 117, "level": "avancado", "cat": "FMEA e Provas de Redundância", "tipo": "qa", "q_pt": "Como a FMEA trata falhas de software no sistema de controle DP?", "a_pt": "Considera falhas de software como modos de falha potenciais, exigindo redundância de computadores DP e comutação automática.", "q_en": "How does the FMEA address software failures in the DP control system?", "a_en": "It treats software faults as potential failure modes, requiring redundant DP computers and automatic switchover.", "opts_pt": null, "opts_en": null}, {"id": 118, "level": "avancado", "cat": "FMEA e Provas de Redundância", "tipo": "qa", "q_pt": "O que é \"common cause failure\" numa FMEA de DP?", "a_pt": "Falha que afeta múltiplos sistemas redundantes simultaneamente, anulando o benefício da redundância.", "q_en": "What is a \"common cause failure\" in a DP FMEA?", "a_en": "A failure that affects multiple redundant systems simultaneously, negating the benefit of redundancy.", "opts_pt": null, "opts_en": null}, {"id": 119, "level": "avancado", "cat": "FMEA e Provas de Redundância", "tipo": "qa", "q_pt": "Qual documento resulta da FMEA e orienta a operação segura do navio?", "a_pt": "O relatório de FMEA e, na prática, a ASOG derivada dele.", "q_en": "What document results from the FMEA and guides the vessel's safe operation?", "a_en": "The FMEA report and, in practice, the ASOG derived from it.", "opts_pt": null, "opts_en": null}, {"id": 120, "level": "avancado", "cat": "FMEA e Provas de Redundância", "tipo": "qa", "q_pt": "Por que testes de FMEA incluem desarme intencional de geradores e thrusters?", "a_pt": "Para confirmar experimentalmente que a perda de cada componente não causa perda de posição, validando a redundância projetada.", "q_en": "Why do FMEA tests include the intentional shutdown of generators and thrusters?", "a_en": "To experimentally confirm that the loss of each component does not cause loss of position, validating the designed redundancy.", "opts_pt": null, "opts_en": null}, {"id": 121, "level": "avancado", "cat": "Análise de Consequência (WCFDI)", "tipo": "qa", "q_pt": "O que é \"Worst Case Failure Design Intent\" (WCFDI)?", "a_pt": "A definição documentada da pior falha única que o sistema deve suportar sem perder posição, conforme a classe DP do navio.", "q_en": "What is \"Worst Case Failure Design Intent\" (WCFDI)?", "a_en": "The documented definition of the worst single failure that the system must withstand without losing position, according to the vessel's DP class.", "opts_pt": null, "opts_en": null}, {"id": 122, "level": "avancado", "cat": "Análise de Consequência (WCFDI)", "tipo": "qa", "q_pt": "O que faz a análise de consequência em tempo real no sistema DP?", "a_pt": "Simula continuamente o efeito da pior falha crível e verifica se a capacidade residual ainda é suficiente para manter posição.", "q_en": "What does real-time consequence analysis do in the DP system?", "a_en": "It continuously simulates the effect of the worst credible failure and checks whether the residual capacity is still enough to hold position.", "opts_pt": null, "opts_en": null}, {"id": 123, "level": "avancado", "cat": "Análise de Consequência (WCFDI)", "tipo": "qa", "q_pt": "O que ocorre quando o \"modo de consequência\" está ativado e uma falha crítica acontece?", "a_pt": "O sistema desliga automaticamente cargas/thrusters não essenciais para evitar sobrecarga e blackout, priorizando manter a posição.", "q_en": "What happens when \"consequence mode\" is active and a critical failure occurs?", "a_en": "The system automatically sheds non-essential loads and thrusters to prevent overload and blackout, prioritizing position keeping.", "opts_pt": null, "opts_en": null}, {"id": 124, "level": "avancado", "cat": "Análise de Consequência (WCFDI)", "tipo": "qa", "q_pt": "Por que operar sem o modo de consequência ativado é arriscado em operações críticas?", "a_pt": "Uma falha real pode causar blackout total em vez de degradação controlada, resultando em perda total de posição.", "q_en": "Why is operating without consequence mode active risky in critical operations?", "a_en": "A real failure could cause a total blackout instead of controlled degradation, resulting in total loss of position.", "opts_pt": null, "opts_en": null}, {"id": 125, "level": "avancado", "cat": "Análise de Consequência (WCFDI)", "tipo": "qa", "q_pt": "O que significa \"footprint\" na análise de consequência?", "a_pt": "A área de excursão de posição prevista após a pior falha, usada para verificar se a embarcação permanece dentro de limites seguros.", "q_en": "What does \"footprint\" mean in consequence analysis?", "a_en": "The predicted position excursion area after the worst failure, used to check whether the vessel stays within safe limits.", "opts_pt": null, "opts_en": null}, {"id": 126, "level": "avancado", "cat": "Análise de Consequência (WCFDI)", "tipo": "qa", "q_pt": "Qual a diferença entre análise de consequência estática e dinâmica?", "a_pt": "A estática avalia a capacidade de empuxo remanescente teórica; a dinâmica simula o comportamento real do navio no tempo, incluindo a resposta transitória.", "q_en": "What is the difference between static and dynamic consequence analysis?", "a_en": "Static evaluates theoretical remaining thrust capacity; dynamic simulates the vessel's real behavior over time after the failure, including transient response.", "opts_pt": null, "opts_en": null}, {"id": 127, "level": "avancado", "cat": "Análise de Consequência (WCFDI)", "tipo": "qa", "q_pt": "O que é o \"worst cas
